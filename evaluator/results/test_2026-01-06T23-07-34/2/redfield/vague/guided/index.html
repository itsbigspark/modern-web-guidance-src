<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needed for positioning, keeping for layout context if any */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor name */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Reset default border/padding/margin for popover */
            border: 0;
            margin: 0;
            
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* sits on top */
            position-try-fallbacks: flip-block; /* flips if runs out of space */
            
            /* Sizing & Spacing */
            margin-bottom: 10px; /* space between input and tooltip */
            width: 140px;
            padding: 8px;
            
            /* Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Transition for smooth appearance */
        #tooltip {
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete, overlay 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Starting style for entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
        
        /* Arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
          interesttarget is deprecated, using interestfor (Interest Invokers).
          popover="hint" is appropriate for tooltips.
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Feature Detection & Polyfills -->
    <script>
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            console.log("Loading Interest Invoker polyfill...");
            const script = document.createElement("script");
            script.src = "./js/interestfor.min.js";
            document.head.appendChild(script);
        }

        if (!HTMLDivElement.prototype.hasOwnProperty("popover")) {
             console.log("Loading Popover polyfill...");
             const script = document.createElement("script");
             script.src = "./js/popover.min.js";
             document.head.appendChild(script);
        }
        
        if (!("positionAnchor" in document.documentElement.style)) {
            console.log("Loading Anchor Positioning polyfill...");
             const script = document.createElement("script");
             script.src = "./js/css-anchor-positioning.js";
             document.head.appendChild(script);
        }
    </script>

</body>
</html>
