<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6f4e37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b2f2f;stop-opacity:1" />
    </linearGradient>
    <filter id="steamFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
      <feGaussianBlur stdDeviation="5" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1a1a1a" />
  <circle cx="600" cy="500" r="150" fill="#f0f0f0" />
  <ellipse cx="600" cy="500" rx="130" ry="100" fill="url(#brew)" />
  <path d="M600 450 Q 620 400 600 350 T 600 250" stroke="white" stroke-width="4" fill="none" opacity="0.5" filter="url(#steamFilter)" />
  <text x="50" y="750" font-family="sans-serif" font-size="40" fill="#ffffff" opacity="0.5">High Quality Coffee Hero</text>
</svg>
