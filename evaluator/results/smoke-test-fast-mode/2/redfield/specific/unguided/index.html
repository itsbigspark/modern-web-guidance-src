<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* Container kept for structure, though positioning is now handled by anchors */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Handled by Popover API / Top Layer */
            
            /* Anchor Positioning */
            position-anchor: --trigger;
            position-area: top;
            margin: 0;
            margin-bottom: 10px; /* Spacing from the trigger */

            /* Visual Styling */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interesttarget handles hover/focus interactions automatically -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- popover attribute promotes element to top layer -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

</body>
</html>
