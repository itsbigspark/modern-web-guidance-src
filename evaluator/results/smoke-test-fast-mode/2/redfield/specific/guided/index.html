<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needs relative positioning for the tooltip */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Modern Popover & Anchor styles */
            position-anchor: --tooltip-trigger;
            position-area: top; 
            position-try-fallbacks: flip-block;
            
            /* Remove manual positioning */
            margin: 0;
            margin-bottom: 10px; /* Offset from the anchor */
            
            /* Visuals */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none; /* Reset default button/dialog borders if any */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 
           Using @position-try to ensure sensible fallbacks if needed, 
           though 'flip-block' covers most vertical cases.
        */

        /* Arrow styling - slightly tricky with top-layer popovers but standard CSS still applies to the element's box */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        
        /* styling for when the popover is showing */
        :popover-open {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor connects this button to the popover 
            popover="hint" gives it tooltip semantics
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <div id="tooltip" popover="hint">I'm a modern native tooltip!</div>
    </div>

</body>
</html>
