<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B3621;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1E12;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1a1a1a"/>
  
  <!-- Table -->
  <rect x="0" y="450" width="800" height="150" fill="#3E2723"/>

  <!-- Saucer -->
  <ellipse cx="400" cy="480" rx="180" ry="40" fill="#EFEFEF"/>
  <ellipse cx="400" cy="480" rx="140" ry="30" fill="#D7CCC8"/>

  <!-- Cup -->
  <path d="M260 300 Q 260 480 400 480 Q 540 480 540 300 Z" fill="#EFEFEF"/>
  <ellipse cx="400" cy="300" rx="140" ry="30" fill="#4B3621"/> <!-- Inner Coffee -->
  
  <!-- Latte Art -->
  <path d="M400 280 Q 420 300 400 320 Q 380 300 400 280" fill="#F5F5F5" filter="url(#glow)"/>
  <path d="M400 290 Q 430 310 400 330 Q 370 310 400 290" fill="#F5F5F5" opacity="0.8"/>

  <!-- Handle -->
  <path d="M540 330 Q 600 330 600 380 Q 600 430 540 430" stroke="#EFEFEF" stroke-width="25" fill="none"/>

  <!-- Steam -->
  <path d="M380 200 Q 400 150 420 200 T 460 200" stroke="#ccc" stroke-width="8" fill="none" opacity="0.3" filter="url(#glow)">
     <animate attributeName="d" values="M380 200 Q 400 150 420 200 T 460 200;M380 180 Q 400 130 420 180 T 460 180" dur="3s" repeatCount="indefinite" />
     <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite" />
  </path>
  <path d="M340 220 Q 360 170 380 220 T 420 220" stroke="#ccc" stroke-width="6" fill="none" opacity="0.2" filter="url(#glow)">
     <animate attributeName="d" values="M340 220 Q 360 170 380 220 T 420 220;M340 200 Q 360 150 380 200 T 420 200" dur="4s" repeatCount="indefinite" />
     <animate attributeName="opacity" values="0.2;0;0.2" dur="4s" repeatCount="indefinite" />
  </path>

</svg>
