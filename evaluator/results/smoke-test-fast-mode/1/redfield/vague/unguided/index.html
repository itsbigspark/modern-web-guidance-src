<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A demonstration of a modern, accessible, custom JavaScript tooltip with glassmorphism aesthetics.">
    <title>Modern Tooltip Experience</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <main class="container">
        <!-- 
            Accessibility Best Practices:
            - aria-describedby: connects the button to the tooltip
            - aria-expanded: indicates state
        -->
        <button 
            id="tooltip-trigger" 
            class="gradient-button" 
            aria-describedby="tooltip" 
            aria-expanded="false"
        >
            Hover me
        </button>

        <!-- 
            Tooltip Role:
            - role="tooltip": identifies this element as a tooltip
            - aria-hidden: manages visibility for screen readers matching visual state
        -->
        <div id="tooltip" class="modern-tooltip" role="tooltip" aria-hidden="true">
            <span class="tooltip-icon">✨</span>
            <span class="tooltip-text">I am a modern, accessible tooltip!</span>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
