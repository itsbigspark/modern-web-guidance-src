<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Bean Coffee</title>
  <meta name="description"
    content="Experience the finest artisanal coffee at Velvet Bean. Sustainably sourced, roasted to perfection.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- Polyfills -->
  <!-- Popover Polyfill -->
  <script src="https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js" type="module"></script>

  <!-- Interest Invoker Polyfill -->
  <script src="https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js" type="module"></script>

  <!-- CSS Anchor Positioning Polyfill -->
  <script src="https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js"
    type="module"></script>

  <!-- Adaptive Loading Custom Polyfill -->
  <script src="adaptive-loading.js" defer></script>
</head>

<body>

  <header>
    <div class="logo">Velvet Bean</div>
    <nav>
      <!-- Simple fake nav for aesthetics -->
      <span style="color: var(--text-secondary); cursor: pointer;">Menu</span>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Awaken Your Senses</h1>
        <p class="subtitle">Experience the perfect balance of bold flavors and creamy texture.</p>

        <div class="action-area">
          <!-- Button triggers popover on hover via interestfor -->
          <button class="details-btn" interestfor="ingredients-popover">
            View Ingredients
          </button>
        </div>
      </div>

      <div class="image-container">
        <!-- 
          Adaptive Loading:
          loading-placeholder points to the low-res image.
          Hero image points to high-res.
        -->
        <img src="hero_coffee.png" loading-placeholder="hero_coffee_small.png" alt="Artisanal Latte on wooden table"
          class="hero-image" width="1024" height="1024">
      </div>

      <!-- Popover Content -->
      <div id="ingredients-popover" popover>
        <h3>Signature Latte</h3>
        <ul class="ingredient-list">
          <li>
            <span class="ing-name">Espresso</span>
            <span class="ing-amount">2 Shots</span>
          </li>
          <li>
            <span class="ing-name">Steamed Milk</span>
            <span class="ing-amount">10 oz</span>
          </li>
          <li>
            <span class="ing-name">Microfoam</span>
            <span class="ing-amount">Top</span>
          </li>
          <li>
            <span class="ing-name">Vanilla Bean</span>
            <span class="ing-amount">Dash</span>
          </li>
        </ul>
      </div>
    </section>

    <!-- Spacer to allow scrolling to see animation -->
    <footer>
      <p>Scroll up to see the magic happen.</p>
    </footer>
  </main>

  <!-- Check for interest invoker support manually if needed, but polyfill should handle it -->
  <script>
    // Manual check to ensure behavior if polyfill needs help (rare, but ensuring correctness)
    document.addEventListener('DOMContentLoaded', () => {
      // Logic managed by polyfills
      console.log('App loaded. Check Network tab and "Slow 3G" throttling to test Adaptive Loading.');
    });
  </script>
</body>

</html>
