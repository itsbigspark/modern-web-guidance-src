<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Reset basic styles */
            margin: 0;
            
            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            width: max-content;
            max-width: 200px;

            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin-bottom: 5px; /* Spacing from trigger */

            /* Animation */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        /* Popover open state */
        #tooltip:popover-open {
            opacity: 1;
        }

        /* Starting style for entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
        
        /* Arrow using ::after is tricky with basic anchor positioning without extra wrapper or complex math. 
           For this modernization, we'll keep it simple or omitting it as plain rectangular tooltips are common with popovers.
           However, let's try to keep the arrow if possible? 
           Anchor positioning arrows are still experimental in some aspects. 
           Let's omit the arrow for now to ensure stability with the polyfill and focus on the core Popover/Interest API. 
        */
    </style>
</head>
<body>

    <div class="container">
        <!-- Added interestfor attribute -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- Added popover attribute -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script>
        (async () => {
            const polyfills = [];

            // 1. Popover API
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                polyfills.push(
                    import("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js")
                );
            }

            // 2. Anchor Positioning
            if (!("positionAnchor" in document.documentElement.style)) {
                polyfills.push(
                    import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js")
                );
            }

            // 3. Interest Invokers
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                polyfills.push(
                    import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js")
                );
            }

            try {
                await Promise.all(polyfills);
            } catch (e) {
                console.error("Error loading polyfills:", e);
            }
        })();
    </script>

</body>
</html>
