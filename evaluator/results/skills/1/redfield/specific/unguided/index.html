<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* Position relative is no longer needed for the tooltip placement 
               because the popover escapes the container (Top Layer),
               but we keep the container for layout structure. */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor for the tooltip */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* 'display: none' is removed because the popover attribute manages visibility */
            
            /* Popover Default Overrides */
            margin: 0;
            padding: 0;
            border: none;
            
            /* Positioning using CSS Anchor Positioning */
            position-anchor: --trigger;
            position: absolute; /* In the top layer, this allows anchor positioning */
            inset: auto; /* Reset default fixed centering */
            
            /* Position above the button */
            bottom: anchor(top);
            left: anchor(center);
            transform: translateX(-50%);
            margin-bottom: 10px; /* Spacer between button and tooltip */

            /* Visual Styles */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            Added 'interesttarget' to link the button to the tooltip.
            This handles hover delays, focus management, and accessibility automatically.
        -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- 
            Added 'popover' attribute to designate this element as a popover.
            This promotes it to the top layer and handles hiding/showing.
        -->
        <div id="tooltip" popover>I'm a modern tooltip!</div>
    </div>

</body>
</html>
