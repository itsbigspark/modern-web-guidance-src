<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip */
        #tooltip {
            /* Tooltip styles */
            background-color: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            /* Positioning */
            position-anchor: --trigger;
            position-area: top;
            /* try top center first */
            width: max-content;
            margin-inline: auto;

            /* Fallbacks if top is clipped */
            position-try-fallbacks: flip-block;

            /* Animation */
            opacity: 0;
            transition: opacity 0.2s allow-discrete, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 
          interestfor connects the button to the popover for hover/focus behavior (hovercard/tooltip)
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="manual">I'm a modern tooltip!</div>
    </div>

    <script>
        (async () => {
            const polyfills = [];

            // 1. Popover API
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                console.log("Polyfilling Popover API...");
                polyfills.push(
                    import("./js/popover.min.js")
                );
            }

            // 2. Anchor Positioning
            if (!("positionAnchor" in document.documentElement.style)) {
                console.log("Polyfilling Anchor Positioning...");
                polyfills.push(
                    import("./js/css-anchor-positioning.js")
                );
            }

            // 3. Interest Invokers
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                console.log("Polyfilling Interest Invokers...");
                polyfills.push(
                    import("./js/interestfor.min.js")
                );
            }

            try {
                await Promise.all(polyfills);
                if (polyfills.length > 0) {
                    console.log("All requested polyfills loaded successfully.");
                } else {
                    console.log("All features supported natively!");
                }
            } catch (e) {
                console.error("Error loading polyfills:", e);
            }
        })();
    </script>

</body>

</html>
