<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --tooltip-bg: rgba(30, 41, 59, 0.8);
            --tooltip-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.15), transparent 40%);
            color: var(--text-color);
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border-radius: 8px;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #tooltip-trigger:hover,
        #tooltip-trigger:focus-visible {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        #tooltip-trigger:active {
            transform: translateY(0);
        }

        /* The Tooltip */
        #tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: max-content;
            max-width: 250px;
            background-color: var(--tooltip-bg);
            color: var(--text-color);
            text-align: center;
            padding: 10px 16px;
            border-radius: 8px;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow);
            border: 1px solid var(--tooltip-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            /* Hidden state */
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            pointer-events: none;
        }

        /* Visible State */
        #tooltip[data-visible="true"] {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" aria-describedby="tooltip">Hover over me</button>
        <div id="tooltip" role="tooltip" aria-hidden="true">
            ✨ Premium Modern Tooltip
        </div>
    </div>

    <script>
        const trigger = document.getElementById('tooltip-trigger');
        const tooltip = document.getElementById('tooltip');

        function showTooltip() {
            tooltip.setAttribute('data-visible', 'true');
            tooltip.setAttribute('aria-hidden', 'false');
        }

        function hideTooltip() {
            tooltip.setAttribute('data-visible', 'false');
            tooltip.setAttribute('aria-hidden', 'true');
        }

        // Mouse Events
        trigger.addEventListener('mouseenter', showTooltip);
        trigger.addEventListener('mouseleave', hideTooltip);

        // Keyboard Focus Events
        trigger.addEventListener('focus', showTooltip);
        trigger.addEventListener('blur', hideTooltip);

        // Escape Key Support
        trigger.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideTooltip();
            }
        });
    </script>

</body>
</html>
