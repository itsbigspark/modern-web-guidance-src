<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <!-- 
          Accessibility Improvements:
          - aria-describedby: links the button to the tooltip text
          - aria-expanded: indicates state
        -->
        <button 
            id="tooltip-trigger-1" 
            class="tooltip-trigger" 
            aria-describedby="tooltip-content-1"
            aria-expanded="false"
        >
            Hover or Focus me
        </button>

        <!-- 
          Tooltip Element:
          - role="tooltip": semantic meaning
          - aria-hidden: manages visibility state for screen readers
        -->
        <div 
            id="tooltip-content-1" 
            class="tooltip" 
            role="tooltip" 
            aria-hidden="true"
        >
            ✨ I am a modern, accessible tooltip!
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
