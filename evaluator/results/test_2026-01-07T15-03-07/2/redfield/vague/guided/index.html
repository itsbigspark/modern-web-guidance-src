<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip (Hidden by default until invoked) */
        #tooltip {
            /* Popover API handles display: none/block automatically */
            position-anchor: --trigger;
            position-area: top;
            width: max-content;
            margin: 0;
            /* Important for popover positioning */

            /* Fallback strategy */
            position-try-fallbacks: flip-block;

            /* Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none;
            /* Remove default dialog/popover border */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            /* Animation */
            transition: opacity 0.2s allow-discrete, overlay 0.2s allow-discrete, display 0.2s allow-discrete;
            opacity: 0;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Anchor the button -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <!-- Tooltip as popover -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills for broader compatibility -->
    <script type="module">
        if (!("anchorName" in document.documentElement.style)) {
            import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
        }
    </script>
    <script type="module" src="https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js"></script>
    <script type="module" src="https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js"></script>

</body>

</html>
