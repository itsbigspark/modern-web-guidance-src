<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip (Hidden by default) */
        #tooltip {
            /* Popover API handles display:none/block */
            position-anchor: --trigger;
            position-area: top;
            margin-inline: auto;
            position-try-fallbacks: flip-block;
            
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Reset default popover border */
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills for Popover, Interest Invokers, and Anchor Positioning -->
    <script src="https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js" type="module"></script>
    <script src="https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js" type="module"></script>
    <script src="https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js" type="module"></script>

</body>
</html>
