<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Declarative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer strictly needed for positioning, but keeping for layout */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --btn;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display/hiding */
            
            /* Anchor Positioning */
            position-anchor: --btn;
            position-area: top;
            position-try-fallbacks: flip-block;
            
            /* Reset/Base styles */
            margin: 0; /* Important for popovers */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Spacing from the anchor */
            margin-block-end: 10px;
        }

        /* Little arrow at the bottom of the tooltip */
        /* Note: Perfect arrow positioning with flip-block requires more complex CSS (anchor-size etc or math functions), 
           keeping it simple for this modernization. */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the trigger to the popover for hover behavior -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" is the semantic type for tooltips -->
        <div id="tooltip" popover="hint">I'm a modern declarative tooltip!</div>
    </div>

    <!-- Polyfills for cross-browser support -->
    <script>
        // Feature detection and polyfill loading
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }

        if (!HTMLDivElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            document.head.appendChild(script);
        }
        
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
