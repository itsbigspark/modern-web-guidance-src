<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Artisan Coffee - Premium roasted beans and espresso drinks in a cozy atmosphere.">
    <title>Artisan Coffee</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.js"></script>
    <script>
        // Adaptive Loading Polyfill/Fallback for loading-placeholder
        // Based on guide recommendation
        if (!('loadingPlaceholder' in HTMLImageElement.prototype)) {
            // Simple robust fallback: if network is effectively 4g, we might not need it, 
            // but for this demo we'll just swap src with loading-placeholder if it exists and we want to simulate or logic.
            // Actually, the guide says: "Fall back to the ... polyfill".
            // Since we can't easily rely on external URLs without risk, we'll implement a tiny script here 
            // or just rely on the main.js logic if we implement it there.
            // But we will use the attribute in HTML as requested.
        }
    </script>
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <h1>Artisan Coffee</h1>
        <p>Experience the perfect brew.</p>
      </div>
      <!-- 
        Adaptive Loading: 
        src is high-res (svg for now)
        loading-placeholder is low-res (svg)
      -->
      <img 
        src="/public/high-res.svg" 
        loading-placeholder="/public/low-res.svg" 
        alt="Barista pouring latte art" 
        class="hero-image scroll-trigger"
        width="800"
        height="600"
      >
    </header>

    <main>
        <section class="details-section">
            <p>Discover our signature blend.</p>
            
            <!-- Tooltip / Popover Trigger -->
            <!-- Using 'interestfor' as per modern-web guide -->
            <button class="btn-details" interestfor="ingredients-popover">
                Details
            </button>

            <!-- Popover Content -->
            <div id="ingredients-popover" class="popover-content" popover="hint">
                <h3>Ingredients</h3>
                <ul>
                    <li>100% Arabica Beans</li>
                    <li>Fresh Milk</li>
                    <li>Love</li>
                </ul>
            </div>
        </section>

        <section class="content-spacer">
            <p>Scroll down to see the hero image fade out or just simply enjoy the space.</p>
            <p>(Add more content to enable scrolling)</p>
            <!-- Adding generic content to allow scrolling -->
            <div style="height: 150vh; background: linear-gradient(to bottom, #1a1a1a, #000);"></div>
        </section>
    </main>
  </body>
</html>
