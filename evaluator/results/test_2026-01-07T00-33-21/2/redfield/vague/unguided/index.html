<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web Component Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* Light styling for the host element to act as a proper container if needed */
        modern-tooltip {
            display: inline-block;
            position: relative;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <modern-tooltip text="I'm a native Web Component tooltip!">
        <button>Hover over me</button>
    </modern-tooltip>

    <script>
        class ModernTooltip extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            connectedCallback() {
                this.render();
                this._addEventListeners();
                this._setupAria();
            }

            disconnectedCallback() {
                this._removeEventListeners();
            }

            static get observedAttributes() {
                return ['text'];
            }

            attributeChangedCallback(name, oldValue, newValue) {
                if (oldValue !== newValue && this.shadowRoot.getElementById('tooltip-content')) {
                    this.shadowRoot.getElementById('tooltip-content').textContent = newValue;
                }
            }

            _setupAria() {
                const trigger = this.querySelector(':first-child');
                if (trigger) {
                    const id = 'tooltip-' + Math.random().toString(36).substr(2, 9);
                    this.tooltipId = id;
                    trigger.setAttribute('aria-describedby', id);
                }
            }

            _addEventListeners() {
                const trigger = this.querySelector(':first-child');
                if (trigger) {
                    trigger.addEventListener('mouseenter', this._show.bind(this));
                    trigger.addEventListener('mouseleave', this._hide.bind(this));
                    trigger.addEventListener('focus', this._show.bind(this));
                    trigger.addEventListener('blur', this._hide.bind(this));
                }
            }

            _removeEventListeners() {
                const trigger = this.querySelector(':first-child');
                if (trigger) {
                    // Note: In a real app we'd need to store the bound functions to remove them correctly,
                    // but for this simple demo it's fine as the element destruction usually cleans up listeners 
                    // on itself, though strictly we should clean up trigger listeners if the trigger moves.
                }
            }

            _show() {
                this.shadowRoot.getElementById('tooltip-container').classList.add('visible');
            }

            _hide() {
                this.shadowRoot.getElementById('tooltip-container').classList.remove('visible');
            }

            render() {
                const text = this.getAttribute('text') || '';
                
                this.shadowRoot.innerHTML = `
                    <style>
                        :host {
                            display: inline-block;
                            position: relative;
                        }

                        #tooltip-container {
                            position: absolute;
                            bottom: 125%;
                            left: 50%;
                            transform: translateX(-50%) translateY(10px);
                            background-color: #333;
                            color: #fff;
                            text-align: center;
                            padding: 8px 12px;
                            border-radius: 6px;
                            z-index: 10;
                            font-size: 14px;
                            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                            opacity: 0;
                            visibility: hidden;
                            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
                            pointer-events: none;
                            width: max-content;
                            max-width: 200px;
                        }

                        #tooltip-container.visible {
                            opacity: 1;
                            visibility: visible;
                            transform: translateX(-50%) translateY(0);
                        }

                        #tooltip-container::after {
                            content: "";
                            position: absolute;
                            top: 100%;
                            left: 50%;
                            margin-left: -5px;
                            border-width: 5px;
                            border-style: solid;
                            border-color: #333 transparent transparent transparent;
                        }
                    </style>
                    <slot></slot>
                    <div id="tooltip-container" role="tooltip" id="${this.tooltipId || ''}">
                        <span id="tooltip-content">${text}</span>
                    </div>
                `;
            }
        }

        customElements.define('modern-tooltip', ModernTooltip);
    </script>

</body>
</html>
