<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <script type="module">
        if (!("anchorName" in document.documentElement.style)) {
          import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning-fn.js");
        }
    </script>
    <script type="module" src="https://unpkg.com/@oddbird/popover-polyfill"></script>
    <script type="module" src="https://unpkg.com/interestfor"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needed for positioning context, but good for layout */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* anchor positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin: 0; /* Reset browser default margins for popovers */
            margin-bottom: 10px; /* Spacing from the trigger */

            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Animation */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Basic Arrow using standard CSS (optional, but requested in original design) 
           Note: exact arrow positioning with position-area is tricky without more complex CSS.
           We'll keep it simple for now as 'position-area' handles the main placement elegantly.
        */
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor handles mouseover/focus logic automatically -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" is the semantic type for tooltips -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- No manual JS needed! -->

</body>
</html>
