<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needed for positioning but kept for structure */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;

            /* Define the anchor */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover/Anchor Styles */
            position-anchor: --trigger;
            bottom: anchor(top);
            /* Position above the trigger */
            justify-self: anchor-center;
            margin: 0;
            /* Reset UA margins */
            margin-bottom: 10px;
            /* Space between trigger and tooltip */

            /* Visual Styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            /* Reset default border */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: visible;
            /* For the arrow */
        }

        /* Little arrow at the bottom of the tooltip (pointing down) */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            /* At the bottom */
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- interesttarget links this button to the popover with id="tooltip" -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>

        <!-- popover attribute makes it a popover element -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

</body>

</html>
