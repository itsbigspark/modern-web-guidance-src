<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;

            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Hidden by default) */
        #tooltip {
            /* Popover implementation handles display */
            border: none;
            padding: 0;
            margin: 0;
            background: transparent;

            position-anchor: --tooltip-trigger;
            position-area: top;
            margin-bottom: 10px;
            /* Slight offset */
            position-try-fallbacks: flip-block;

            /* Visual styling moved from container/legacy to internal wrapper or directly here if possible */
            /* But popover resets some styles, so we need to be careful. */
            /* Let's style the content mainly. */
            overflow: visible;
        }

        /* Styling the content of the tooltip */
        .tooltip-content {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            width: max-content;
            max-width: 200px;
        }

        /* Little arrow at the bottom of the tooltip */
        .tooltip-content::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        /* Popover animation */
        [popover] {
            transition: opacity 0.2s, display 0.2s allow-discrete;
            opacity: 0;
        }

        [popover]:popover-open {
            opacity: 1;
        }

        @starting-style {
            [popover]:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- interestfor attribute ties the button to the popover via Interest Invokers -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>

        <!-- popover attribute makes it a popover -->
        <div id="tooltip" popover="hint">
            <div class="tooltip-content">
                I'm a modern tooltip!
            </div>
        </div>
    </div>

    <script>
        // Feature detection and Polyfill loading

        // 1. Interest Invokers
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }

        // 2. Popover
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            script.type = "module"; // Popover polyfill might need module or specific handling, checking best practice.
            // The oddbird polyfill is often used as a module or script. 
            // The link in SKILL.md is .min.js, usually safe to include as script.
            document.head.appendChild(script);
        }

        // 3. Anchor Positioning
        if (!("positionAnchor" in document.documentElement.style) && !CSS.supports("position-anchor: --foo")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            script.type = "module";
            document.head.appendChild(script);
        }
    </script>

</body>

</html>
