<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Tooltip Demo</title>
  </head>
  <body>
    <div id="app">
      <div class="tooltip-wrapper">
        <button 
          id="tooltip-trigger" 
          class="visible-trigger"
          aria-describedby="tooltip-content"
          aria-expanded="false"
        >
          Hover or Focus Me
        </button>
        <!-- role="tooltip" identifies this as a tooltip. id matches aria-describedby -->
        <div id="tooltip-content" role="tooltip" class="tooltip hidden">
          <span class="tooltip-text">I am a modern, accessible tooltip!</span>
          <div class="tooltip-arrow"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
