<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip</title>
    <!-- Polyfills -->
    <script src="https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js" type="module"></script>
    <script src="https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js" type="module"></script>
    <script src="https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js" type="module"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --tooltip-bg: #1e293b;
            --tooltip-border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-color);
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            anchor-name: --tooltip-trigger;
        }

        #tooltip-trigger:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin: 0; /* Reset default margin */
            margin-bottom: 10px; /* Spacing from anchor if positioned top */
            
            background-color: var(--tooltip-bg);
            color: var(--text-color);
            border: 1px solid var(--tooltip-border);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            
            /* Animation */
            transition: opacity 0.2s allow-discrete, display 0.2s allow-discrete, overlay 0.2s allow-discrete;
            opacity: 0;
        }

        #tooltip:popover-open {
            opacity: 1;
        }
        
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Modern Tooltip Demo</h1>
        <p style="color: #94a3b8; margin-bottom: 2rem;">Using Popover API + Interest Invokers</p>
        
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <div id="tooltip" popover="hint">
            I'm a modern popover tooltip!
        </div>
    </div>

</body>
</html>
