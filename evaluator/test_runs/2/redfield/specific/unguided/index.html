<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip (Hidden by default) */
        #tooltip {
            /* display set by popover */
            position-anchor: --trigger;
            position: absolute; /* content-box or absolute? Popover is fixed usually, but we can override */
            margin: 0; /* Reset default popover margin */
            bottom: anchor(top);
            left: anchor(center);
            transform: translateX(-50%);
            margin-bottom: 10px; /* Gap */
            
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            /* z-index: 1; -> Popover handles z-index (top layer) */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        <div id="tooltip" popover>I'm a modern tooltip!</div>
    </div>

    <!-- No JavaScript needed! -->

</body>
</html>
