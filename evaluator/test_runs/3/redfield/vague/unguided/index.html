<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declarative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --trigger;
            position-area: top;
            margin-bottom: 10px; /* Space from trigger */
            
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Reset default popover border */
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        /* Popover animation */
        [popover] {
            transition: opacity 0.2s, display 0.2s allow-discrete;
            opacity: 0;
        }
        
        [popover]:popover-open {
            opacity: 1;
        }
        
        /* Starting style for entry animation */
        @starting-style {
            [popover]:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        <div id="tooltip" popover>I'm a declarative tooltip!</div>
    </div>

</body>
</html>
