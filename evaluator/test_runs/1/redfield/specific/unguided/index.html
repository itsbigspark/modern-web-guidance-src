<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Hidden by default until popover opens) */
        #tooltip {
            /* Position relative to the anchor */
            position-anchor: --tooltip-trigger;
            top: anchor(top);
            left: anchor(center);
            translate: -50% -100%; /* Move up and center manually since we want it Above */
            /* Alternatively with position-area: position-area: top center; margin-bottom: 10px; */
            margin-bottom: 10px;
            
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none; /* override default popover border */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Added interesttarget to invoke the popover on hover/focus -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- Added popover attribute -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

</body>
</html>
