<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            width: max-content;
            margin: 0; /* Reset margins */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }
        
        /* Optional: Add a small gap if position-area supports it or via margin */
        #tooltip:popover-open {
            /* Ensure it is visible when open */
            margin-bottom: 5px; /* Spacing from anchor */
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script>
        // Feature detection and polyfill loading
        (async () => {
            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            }

            const polyfills = [];

            // Interest Invokers
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                console.log("Loading interestfor polyfill...");
                polyfills.push(loadScript('./js/interestfor.min.js'));
            }

            // Popover API
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                console.log("Loading popover polyfill...");
                polyfills.push(loadScript('./js/popover.min.js'));
            }

            // CSS Anchor Positioning
            if (!("positionAnchor" in document.documentElement.style) && !CSS.supports("position-anchor: --foo")) {
                console.log("Loading css-anchor-positioning polyfill...");
                polyfills.push(loadScript('./js/css-anchor-positioning.js'));
            }

            await Promise.all(polyfills);
            console.log("All necessary polyfills loaded.");
        })();
    </script>
</body>
</html>
