<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --tooltip-trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin: 8px 0; /* Add some spacing from the anchor */
            
            width: max-content;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            
            /* Popover defaults often include a border or background we might want to override */
            inset: auto;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        /* Adjust arrow if it flips to the bottom */
        @supports (position-area: bottom) {
            #tooltip:position-area(bottom)::after {
                top: auto;
                bottom: 100%;
                border-color: transparent transparent #333 transparent;
            }
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    <div id="tooltip" popover="hint">I'm a modern tooltip!</div>

</body>
</html>
