<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modernized Tooltip</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --tooltip-bg: #1e293b;
            --tooltip-text: #f8fafc;
            --radius: 0.5rem;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        #tooltip-trigger {
            padding: 0.625rem 1.25rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: var(--radius);
            transition: background-color 0.2s, transform 0.1s;
            
            /* Define anchor name */
            anchor-name: --tooltip-trigger;
        }

        #tooltip-trigger:hover {
            background-color: var(--primary-hover);
        }

        #tooltip-trigger:active {
            transform: scale(0.98);
        }

        #tooltip {
            /* Remove default popover styling */
            border: none;
            padding: 0;
            margin: 0;
            overflow: visible;
            background: transparent;
            color: inherit;

            /* Positioning via Anchor API */
            position: fixed;
            position-anchor: --tooltip-trigger;
            bottom: anchor(top);
            left: anchor(center);
            transform: translateX(-50%) translateY(-10px);

            /* Visual Design */
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            white-space: nowrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            pointer-events: none;

            /* Modern Transition using entry/exit effects */
            opacity: 0;
            transition: 
                opacity 0.15s ease-out,
                transform 0.15s ease-out,
                display 0.15s ease-out allow-discrete,
                overlay 0.15s ease-out allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
            transform: translateX(-50%) translateY(-6px);
        }

        /* Set the starting state for the entry transition */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* Tooltip Arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--tooltip-bg);
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger">Hover over me</button>
    <div id="tooltip" popover="manual">Modern CSS Anchor positioning!</div>

    <script>
        const trigger = document.getElementById('tooltip-trigger');
        const tooltip = document.getElementById('tooltip');

        // Use modern Popover methods
        trigger.addEventListener('mouseenter', () => tooltip.showPopover());
        trigger.addEventListener('mouseleave', () => tooltip.hidePopover());
    </script>

</body>
</html>
