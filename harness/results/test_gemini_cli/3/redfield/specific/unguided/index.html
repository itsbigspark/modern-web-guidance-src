<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name for the tooltip to reference */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Reset default popover styles */
            margin: 0;
            border: none;
            padding: 8px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 140px;
            
            /* Modern Positioning: CSS Anchor Positioning 
               This places the tooltip in the top layer relative to the trigger. */
            position: absolute;
            position-anchor: --tooltip-trigger;
            bottom: anchor(top);
            left: anchor(center);
            transform: translateX(-50%) translateY(-10px);

            /* Modern Transitions for Popovers */
            transition: 
                opacity 0.2s ease-out, 
                transform 0.2s ease-out, 
                display 0.2s ease-out allow-discrete,
                overlay 0.2s ease-out allow-discrete;
            opacity: 0;
        }

        /* State when popover is open */
        #tooltip:popover-open {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        /* Entry animation starting state */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        #tooltip img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- interesttarget handles hover/focus invocation automatically -->
    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
    
    <!-- popover attribute puts the element in the top layer -->
    <div id="tooltip" popover>
        <img src="https://picsum.photos/id/20/140/80" alt="Stock photo">
        I'm a modern tooltip!
    </div>

</body>
</html>
