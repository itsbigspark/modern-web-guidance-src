<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (using Popover API) */
        #tooltip {
            /* Popover defaults to display: none when not shown */
            position: absolute;
            position-anchor: --tooltip-trigger;
            bottom: anchor(top);
            margin-bottom: 10px;
            left: anchor(center);
            transform: translateX(-50%);
            
            width: 200px;
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            /* Remove default popover styles */
            border: 1px solid #e5e7eb;
            margin: 0;
            overflow: visible;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            display: block;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }

        /* Show tooltip only when popover is open */
        #tooltip:popover-open {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
    <div id="tooltip" popover>
        <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=400&auto=format&fit=crop&q=60" alt="Gradient Background">
        <span>I'm a modern popover tooltip with an image!</span>
    </div>

</body>
</html>
