<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin-bottom: 12px;
            width: max-content;
            background-color: white;
            color: #1a1a1b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #tooltip img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        /* Tooltip arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: white transparent transparent transparent;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    
    <div id="tooltip" popover="hint">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=100&h=100&auto=format&fit=crop" alt="Profile">
        <div>
            <div style="font-weight: 600;">Modern Popover</div>
            <div style="color: #6b7280; font-size: 12px;">Using Interest Invokers & Anchor Positioning</div>
        </div>
    </div>

</body>
</html>
