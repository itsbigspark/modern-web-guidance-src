<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary-color: #2563eb;
            --text-color: #1e293b;
            --tooltip-bg: rgba(255, 255, 255, 0.9);
            --tooltip-border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        /* The Button - Anchor */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            transition: transform 0.1s ease, background-color 0.2s ease;
            anchor-name: --tooltip-anchor;
        }

        #tooltip-trigger:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        #tooltip-trigger:active {
            transform: translateY(0);
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Remove default popover styles */
            border: none;
            padding: 0;
            margin: 0;
            background: transparent;
            overflow: visible;
            
            /* Anchor Positioning */
            position-anchor: --tooltip-anchor;
            position-area: top;
            position-try-options: flip-block, flip-inline;
            margin-bottom: 12px;

            /* Visuals */
            width: 280px;
            background-color: var(--tooltip-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--tooltip-border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            
            /* Animation */
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: 
                opacity 0.2s ease, 
                transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                display 0.2s allow-discrete,
                overlay 0.2s allow-discrete;
        }

        /* Shown state for Popover */
        #tooltip:popover-open {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Starting style for the entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }
        }

        .tooltip-content {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .tooltip-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 11px 11px 0 0;
        }

        .tooltip-text {
            padding: 16px;
        }

        .tooltip-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            display: block;
        }

        .tooltip-description {
            font-size: 0.875rem;
            color: #64748b;
            line-height: 1.5;
        }

        /* Arrow using Anchor Positioning */
        #tooltip::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -6px;
            transform: translateX(-50%) rotate(45deg);
            width: 12px;
            height: 12px;
            background-color: var(--tooltip-bg);
            border-right: 1px solid var(--tooltip-border);
            border-bottom: 1px solid var(--tooltip-border);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>

    <h1>Modern Tooltip</h1>

    <button id="tooltip-trigger">Discover more</button>

    <div id="tooltip" popover="manual">
        <div class="tooltip-content">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Code on a screen" class="tooltip-image">
            <div class="tooltip-text">
                <span class="tooltip-title">Native Browser APIs</span>
                <p class="tooltip-description">
                    This tooltip uses the <strong>Popover API</strong> and <strong>CSS Anchor Positioning</strong> for a performant, accessible experience.
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        const trigger = document.getElementById('tooltip-trigger');
        const tooltip = document.getElementById('tooltip');

        let hideTimeout;

        const show = () => {
            clearTimeout(hideTimeout);
            tooltip.showPopover();
        };

        const hide = () => {
            // Short delay to allow moving mouse from trigger to tooltip if needed
            // though for a simple tooltip usually immediate is fine.
            hideTimeout = setTimeout(() => {
                tooltip.hidePopover();
            }, 100);
        };

        trigger.addEventListener('mouseenter', show);
        trigger.addEventListener('mouseleave', hide);

        // Keep tooltip open when hovering over the tooltip itself
        tooltip.addEventListener('mouseenter', show);
        tooltip.addEventListener('mouseleave', hide);
    </script>

</body>
</html>
