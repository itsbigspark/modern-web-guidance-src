<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --text: #1e293b;
            --tooltip-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1200&q=80') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: #0f172a;
        }

        /* The Trigger Button */
        #tooltip-trigger {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background-color: var(--primary);
            color: white;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            anchor-name: --trigger;
        }

        #tooltip-trigger:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        /* Modern Tooltip using Popover and Anchor Positioning */
        #tooltip {
            /* Reset default popover styles */
            border: none;
            padding: 0;
            margin: 0;
            background: transparent;
            overflow: visible;

            /* Anchor positioning */
            position: absolute;
            position-anchor: --trigger;
            position-area: top;
            position-try-options: flip-block, flip-inline;
            margin-bottom: 12px;
            
            /* Animations */
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: 
                opacity 0.2s ease, 
                transform 0.2s ease, 
                display 0.2s ease allow-discrete;
        }

        /* Open state */
        #tooltip:popover-open {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Animation for entry */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }
        }

        .tooltip-content {
            background-color: var(--tooltip-bg);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            position: relative;
        }

        /* Modern arrow using CSS */
        .tooltip-content::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Modern Tooltip</h1>
        <button id="tooltip-trigger">Hover over me</button>
        
        <!-- Native Popover element -->
        <div id="tooltip" popover="manual">
            <div class="tooltip-content">
                ✨ Native Popover + Anchor Positioning
            </div>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('tooltip-trigger');
        const tooltip = document.getElementById('tooltip');

        // Modern tooltips often use hover for triggers.
        // We use the showPopover/hidePopover API for top-layer rendering.
        trigger.addEventListener('mouseenter', () => {
            tooltip.showPopover();
        });

        trigger.addEventListener('mouseleave', () => {
            tooltip.hidePopover();
        });
    </script>

</body>
</html>
