<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip using Popover and Anchor Positioning */
        #tooltip {
            margin: 0;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            width: max-content;
        }

        /* Little arrow using a cleaner approach */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
    <script>
        // Feature detection and conditional polyfill loading
        (function() {
            const polyfills = [];
            
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                polyfills.push("interestfor.min.js");
            }
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                polyfills.push("popover-polyfill.min.js");
            }
            if (!("positionAnchor" in document.documentElement.style)) {
                polyfills.push("css-anchor-positioning.js");
            }

            polyfills.forEach(src => {
                const script = document.createElement("script");
                script.src = src;
                script.async = false; // Load in order if needed
                document.head.appendChild(script);
            });
        })();
    </script>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    <div id="tooltip" popover="hint">I'm a modern tooltip!</div>

</body>
</html>
