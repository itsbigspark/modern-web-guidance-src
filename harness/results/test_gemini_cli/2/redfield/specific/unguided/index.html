<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            /* Anchor name for positioning the tooltip */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip using Popover and Anchor Positioning */
        #tooltip {
            /* Tether to the button anchor */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            
            /* Styling */
            width: max-content;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Popover specific resets */
            margin: 0;
            border: none;
        }

        /* Little arrow at the bottom of the tooltip */
        /* Note: With anchor positioning, we might want to be more careful, 
           but for a simple modernization this keeps the look. */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor triggers the popover on hover/focus -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <!-- popover="hint" is optimized for non-interactive tooltips -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
