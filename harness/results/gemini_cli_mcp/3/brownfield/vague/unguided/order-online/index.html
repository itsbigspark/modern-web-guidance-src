<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Online | The Daily Grind</title>
  <meta name="view-transition" content="same-origin" />
  <script type="speculationrules">
  {
    "prerender": [{
      "source": "document",
      "where": {
        "href_matches": "/*"
      },
      "eagerness": "moderate"
    }]
  }
  </script>
  <style>
    :root {
      --primary: #4e342e;
      --secondary: #d7ccc8;
      --accent: #ffab40;
      --text: #3e2723;
      --light: #fafafa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--light);
    }

    /* Navigation */
    nav {
      background: var(--primary);
      color: white;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    
    .logo a {
      color: white;
      text-decoration: none;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .logout-link {
      border: 1px solid var(--accent);
      padding: 5px 12px;
      border-radius: 4px;
    }
    
    .hero-small {
      height: 30vh;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
        url('https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }
    
    .hero-small h1 {
      font-size: 2.5rem;
    }

    /* Content Sections */
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      min-height: 50vh;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .card h3 {
      margin-bottom: 10px;
      color: var(--primary);
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 15px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #3e2723;
    }

    footer {
      background: var(--secondary);
      text-align: center;
      padding: 40px 20px;
      margin-top: 40px;
    }

    .footer-links {
      margin-bottom: 20px;
    }

    .footer-links a {
      margin: 0 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo"><a href="/">THE DAILY GRIND</a></div>
    <ul>
      <li><a href="/menu">Menu</a></li>
      <li><a href="/locations">Locations</a></li>
      <li><a href="/rewards">Rewards</a></li>
      <li><a href="/account">My Account</a></li>
      <li><a href="/logout" class="logout-link">Logout</a></li>
    </ul>
  </nav>

  <header class="hero-small">
    <h1>Order Ahead</h1>
  </header>

  <main class="container">
    
        <div style="text-align: center;">
            <h2>Skip the Line</h2>
            <p>Select your items and pick up in store.</p>
            <a href="/menu" class="btn">Start Order</a>
        </div>
        
  </main>

  <footer>
    <div class="footer-links">
      <a href="/about">Our Story</a> |
      <a href="/careers">Join the Team</a> |
      <a href="/contact">Contact Us</a> |
      <a href="/privacy-policy">Privacy</a>
    </div>
    <p>&copy; 2026 The Daily Grind Coffee Co. All rights reserved.</p>
  </footer>

</body>
</html>
