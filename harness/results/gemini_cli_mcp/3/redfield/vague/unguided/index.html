<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Implementation</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --tooltip-bg: rgba(30, 41, 59, 0.9);
            --tooltip-text: #ffffff;
            --transition-speed: 0.2s;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }

        .card-desc {
            font-size: 0.875rem;
            color: #64748b;
            margin: 0;
        }

        /* Modern Tooltip Element */
        .tooltip-element {
            position: fixed; /* Fixed to avoid containment issues */
            top: 0;
            left: 0;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            pointer-events: none; /* Let mouse pass through */
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            max-width: 250px;
            line-height: 1.4;
        }

        .tooltip-element.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Arrow (Optional, tricky with fixed positioning, simplified here to simple floating box) */
    </style>
</head>
<body>

    <h1>Modern Tooltip Gallery</h1>

    <div class="gallery">
        <!-- Card 1 -->
        <div class="card" 
             tabindex="0"
             data-tooltip="A foggy forest landscape. Ideal for relaxation and calm." 
             aria-describedby="tooltip-content">
            <img src="https://picsum.photos/id/10/400/300" alt="Forest">
            <div class="card-content">
                <h3 class="card-title">Misty Forest</h3>
                <p class="card-desc">Hover for details</p>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card" 
             tabindex="0"
             data-tooltip="A working laptop with a cup of coffee. Productivity vibe." 
             aria-describedby="tooltip-content">
            <img src="https://picsum.photos/id/20/400/300" alt="Workspace">
            <div class="card-content">
                <h3 class="card-title">Workspace</h3>
                <p class="card-desc">Hover for details</p>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card" 
             tabindex="0"
             data-tooltip="Vast starry night sky over mountains." 
             aria-describedby="tooltip-content">
            <img src="https://picsum.photos/id/27/400/300" alt="Stars">
            <div class="card-content">
                <h3 class="card-title">Night Sky</h3>
                <p class="card-desc">Hover for details</p>
            </div>
        </div>
    </div>

    <!-- The single tooltip instance -->
    <div id="tooltip-content" class="tooltip-element" role="tooltip" aria-hidden="true"></div>

    <script>
        /**
         * Modern Tooltip Manager
         * Uses a singleton pattern to manage a single tooltip DOM element.
         * Handles positioning, content updates, and accessibility.
         */
        class TooltipManager {
            constructor() {
                this.tooltip = document.getElementById('tooltip-content');
                this.activeElement = null;
                this.margin = 12; // Gap between element and tooltip

                this.init();
            }

            init() {
                // Event Delegation: Listen on document for any element with data-tooltip
                document.addEventListener('mouseover', this.handleMouseOver.bind(this));
                document.addEventListener('mouseout', this.handleMouseOut.bind(this));
                document.addEventListener('focusin', this.handleFocusIn.bind(this));
                document.addEventListener('focusout', this.handleFocusOut.bind(this));
            }

            handleMouseOver(e) {
                const target = e.target.closest('[data-tooltip]');
                if (target) this.show(target);
            }

            handleMouseOut(e) {
                const target = e.target.closest('[data-tooltip]');
                if (!target) return;

                // Check if the new element (relatedTarget) is still inside the current target
                // This prevents flickering when moving mouse between child elements
                if (e.relatedTarget && target.contains(e.relatedTarget)) return;

                this.hide();
            }

            handleFocusIn(e) {
                const target = e.target.closest('[data-tooltip]');
                if (target) this.show(target);
            }

            handleFocusOut(e) {
                const target = e.target.closest('[data-tooltip]');
                if (target) this.hide();
            }

            show(element) {
                this.activeElement = element;
                const content = element.getAttribute('data-tooltip');
                
                if (!content) return;

                // Update Content
                this.tooltip.textContent = content;
                this.tooltip.setAttribute('aria-hidden', 'false');
                
                // Position logic
                this.updatePosition(element);

                // Show
                this.tooltip.classList.add('visible');
            }

            hide() {
                this.activeElement = null;
                this.tooltip.classList.remove('visible');
                this.tooltip.setAttribute('aria-hidden', 'true');
            }

            updatePosition(element) {
                const rect = element.getBoundingClientRect();
                const tooltipRect = this.tooltip.getBoundingClientRect();

                // Center horizontally
                let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
                
                // Position above by default
                let top = rect.top - tooltipRect.height - this.margin;

                // Viewport Boundary Detection
                
                // If it goes off the left edge, align with left edge of element
                if (left < this.margin) {
                    left = this.margin;
                }

                // If it goes off the right edge, align with right edge of viewport
                if (left + tooltipRect.width > window.innerWidth - this.margin) {
                    left = window.innerWidth - tooltipRect.width - this.margin;
                }

                // If it goes off the top, flip to bottom
                if (top < this.margin) {
                    top = rect.bottom + this.margin;
                }

                this.tooltip.style.left = `${left}px`;
                this.tooltip.style.top = `${top}px`;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new TooltipManager();
        });
    </script>
</body>
</html>
