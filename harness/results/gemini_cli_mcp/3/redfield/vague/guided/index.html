<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Managed by Popover API) */
        #tooltip {
            /* Position relative to the anchor */
            position-anchor: --tooltip-trigger;
            position-area: top; 
            margin-bottom: 10px;
            
            /* Visual styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            
            /* Ensure it doesn't take full width */
            width: max-content;
            margin-inline: auto;
        }
        
        /* Basic fallback for when popover is open but positioning might fail without polyfill loaded yet */
        #tooltip:popover-open {
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" makes it a non-modal tooltip -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script>
        // Feature detection and polyfill loading
        
        // 1. Interest Invokers
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement("script");
            script.src = "js/polyfills/interestfor.min.js";
            document.head.appendChild(script);
        }
        
        // 2. Popover API
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement("script");
            script.src = "js/polyfills/popover.min.js";
            document.head.appendChild(script);
        }

        // 3. CSS Anchor Positioning
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement("script");
            script.src = "js/polyfills/css-anchor-positioning.js";
            script.type = "module"; 
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
