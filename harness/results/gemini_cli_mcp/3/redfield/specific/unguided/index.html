<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover API Tooltip</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Basic Popover Styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Anchor Positioning */
            position-anchor: --trigger;
            inset-area: top; /* Positions the element above the anchor */
            margin-bottom: 10px; /* Spacing */
            
            /* Animation for smooth entry/exit (Optional but nice) */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        /* Styling for when the popover is open */
        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        
        /* Support for browsers without Interest Invokers (fallback not implemented per strict instructions, 
           but noting that this relies on experimental 'interesttarget') */
    </style>
</head>
<body>

    <!-- 
      interesttarget connects this button to the popover 
      and handles hover/focus behavior automatically 
    -->
    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>

    <!-- 
      popover attribute makes it a Popover API element 
    -->
    <div id="tooltip" popover>I'm a modern popover tooltip!</div>

</body>
</html>
