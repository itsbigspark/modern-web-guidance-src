<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declarative Tooltip Demo</title>
    <script src="lib/popover.js"></script>
    <script type="module" src="lib/css-anchor-positioning.js"></script>
    <script src="lib/interestfor.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --tooltip-trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            width: max-content;
            max-width: 200px;
            margin-inline: auto; /* Center horizontally relative to anchor */
            position-try-fallbacks: flip-block;
            
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            
            /* Remove default popover margin if any affecting layout */
            margin: 0;
            margin-bottom: 10px; /* Space from the button */
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            Modern implementation:
            - interestfor links the button to the popover for hover/focus behavior
            - popover="hint" designates the div as a non-modal popover (tooltip)
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
