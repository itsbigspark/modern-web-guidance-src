<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Polyfills -->
    <script src="popover.min.js"></script>
    <script src="css-anchor-positioning.js"></script>
    <script src="interestfor.min.js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative; /* Context for any absolute positioning if fallback is needed, though anchor handles it */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Basic styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Popovers have a default border */
            
            /* Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Shorthand for 'top center' */
            width: max-content;
            margin: 0; /* Reset default popover margin */
            margin-bottom: 5px; /* Spacing from the trigger */
            position-try-fallbacks: flip-block;
            
            /* Animation (optional but nice) */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        /* Popover open state */
        #tooltip:popover-open {
            opacity: 1;
        }

        /* Initial state for popover */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Arrow (using a pseudo-element, might need adjustments with anchor positioning) */
        /* Anchor positioning handles placement, so an arrow is a bit trickier to align perfectly without more complex anchor usage, 
           but we can approximate it or omit it for this modern demo. I'll omit it to keep it clean and focused on the API. */
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Connects the button to the popover for hover/focus interactions
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- 
            popover="hint": Indicates this is a non-modal, transient popover (tooltip)
        -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
