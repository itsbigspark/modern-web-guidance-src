<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --tooltip-bg: #222;
            --tooltip-text: #fff;
            --tooltip-radius: 8px;
            --tooltip-padding: 12px;
            --tooltip-arrow-size: 6px;
            --tooltip-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition-speed: 0.2s;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .tooltip-container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
            transition: background-color var(--transition-speed) ease;
        }

        .tooltip-trigger:hover,
        .tooltip-trigger:focus-visible {
            background-color: var(--primary-hover);
            outline: 2px solid var(--primary-hover);
            outline-offset: 2px;
        }

        /* The Tooltip */
        .tooltip {
            position: absolute;
            bottom: calc(100% + 10px); /* Position above the button with gap */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 200px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: center;
            padding: 0; /* Reset padding for image containment */
            border-radius: var(--tooltip-radius);
            z-index: 10;
            font-size: 0.875rem;
            box-shadow: var(--tooltip-shadow);
            
            /* Visibility State - Hidden */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease, 
                        transform var(--transition-speed) ease, 
                        visibility var(--transition-speed) ease;
        }

        /* Tooltip Visible State */
        .tooltip[data-show] {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        /* Arrow */
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: calc(var(--tooltip-arrow-size) * -1);
            border-width: var(--tooltip-arrow-size);
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Tooltip Content Styling */
        .tooltip-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-top-left-radius: var(--tooltip-radius);
            border-top-right-radius: var(--tooltip-radius);
            display: block;
        }

        .tooltip-content {
            padding: var(--tooltip-padding);
        }
    </style>
</head>
<body>

    <div class="tooltip-container">
        <button class="tooltip-trigger" aria-describedby="tooltip-content" aria-expanded="false">
            Hover or Focus me
        </button>
        <div id="tooltip-content" role="tooltip" class="tooltip">
            <img src="https://images.unsplash.com/photo-1531297461136-82lw8e41581b?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Technology abstract" class="tooltip-image">
            <div class="tooltip-content">
                <strong>Modern Tooltip</strong>
                <p style="margin: 4px 0 0 0; color: #ccc;">Now with rich content and accessibility.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.querySelector('.tooltip-trigger');
            const tooltip = document.querySelector('.tooltip');
            
            let isHovered = false;
            let isFocused = false;

            function updateTooltipState() {
                if (isHovered || isFocused) {
                    tooltip.setAttribute('data-show', '');
                    trigger.setAttribute('aria-expanded', 'true');
                } else {
                    tooltip.removeAttribute('data-show');
                    trigger.setAttribute('aria-expanded', 'false');
                }
            }

            function forceHide() {
                tooltip.removeAttribute('data-show');
                trigger.setAttribute('aria-expanded', 'false');
                // We don't reset isHovered/isFocused here to allow natural re-triggering
                // on re-entry or re-focus, but we might want to suppress immediate re-show
                // until state changes. For this simple demo, immediate hiding is the goal.
            }

            // Mouse Events
            trigger.addEventListener('mouseenter', () => {
                isHovered = true;
                updateTooltipState();
            });

            trigger.addEventListener('mouseleave', () => {
                isHovered = false;
                updateTooltipState();
            });

            // Keyboard Events
            trigger.addEventListener('focus', () => {
                isFocused = true;
                updateTooltipState();
            });

            trigger.addEventListener('blur', () => {
                isFocused = false;
                updateTooltipState();
            });

            // Handle Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && trigger.getAttribute('aria-expanded') === 'true') {
                    forceHide();
                    isHovered = false; // Reset assumptions to prevent stuck state
                    isFocused = false; // Reset assumptions
                    trigger.focus(); 
                }
            });
        });
    </script>

</body>
</html>
