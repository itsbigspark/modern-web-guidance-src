<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | The Daily Grind</title>
  <style>
    :root {
      --primary: #4e342e;
      --secondary: #d7ccc8;
      --accent: #ffab40;
      --text: #3e2723;
      --light: #fafafa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--light);
    }

    /* Navigation */
    nav {
      background: var(--primary);
      color: white;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .logout-link {
      border: 1px solid var(--accent);
      padding: 5px 12px;
      border-radius: 4px;
    }

    /* Content Sections */
    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #3e2723;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--primary);
    }

    footer {
      background: var(--secondary);
      text-align: center;
      padding: 40px 20px;
      margin-top: 40px;
    }

    .footer-links {
      margin-bottom: 20px;
    }

    .footer-links a {
      margin: 0 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
    }
  </style>
  <script src="https://instant.page/5.2.0" type="module" integrity="sha384-jnZyxPjiipYXnSU0ygqeac2q7CVYMbh84GO0uHryzYj+Mraw7YOF92BOsx2uoJ6H"></script>
</head>

<body>

  <nav>
    <div class="logo"><a href="/" style="color: white; text-decoration: none;">THE DAILY GRIND</a></div>
    <ul>
      <li><a href="/menu">Menu</a></li>
      <li><a href="/locations">Locations</a></li>
      <li><a href="/rewards">Rewards</a></li>
      <li><a href="/account">My Account</a></li>
      <li><a href="/logout" class="logout-link">Logout</a></li>
    </ul>
  </nav>

  <main class="container">
    <h2>Login</h2>
    <form>
      <div class="form-group">
        <label for="username">Username / Email</label>
        <input type="text" id="username" name="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password">
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <p style="margin-top: 15px; text-align: center;">Don't have an account? <a href="#">Sign up</a></p>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/about">Our Story</a> |
      <a href="/careers">Join the Team</a> |
      <a href="/contact">Contact Us</a> |
      <a href="/privacy-policy">Privacy</a>
    </div>
    <p>&copy; 2026 The Daily Grind Coffee Co. All rights reserved.</p>
  </footer>

</body>

</html>
