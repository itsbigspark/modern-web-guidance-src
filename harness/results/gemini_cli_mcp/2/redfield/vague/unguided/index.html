<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --tooltip-bg: #1f2937;
            --tooltip-text: #f9fafb;
            --bg-color: #f3f4f6;
            --transition-speed: 0.2s;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .tooltip-container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 0.5rem;
            transition: background-color var(--transition-speed) ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .tooltip-trigger:hover,
        .tooltip-trigger:focus {
            background-color: var(--primary-hover);
            outline: 2px solid transparent;
            outline-offset: 2px;
        }
        
        .tooltip-trigger:focus-visible {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
        }

        /* The Tooltip */
        .tooltip {
            position: absolute;
            bottom: calc(100% + 10px); /* 10px gap */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: max-content;
            max-width: 200px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: center;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            /* Hiding mechanics */
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease, visibility var(--transition-speed);
            pointer-events: none;
        }

        /* Arrow */
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Show State */
        .tooltip.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="tooltip-container">
        <button id="btn-1" class="tooltip-trigger" aria-describedby="tooltip-1">
            Hover or Focus me
        </button>
        <div id="tooltip-1" role="tooltip" class="tooltip" aria-hidden="true">
            Modern CSS & JS Tooltip
        </div>
    </div>

    <script>
        class TooltipManager {
            constructor() {
                this.triggers = document.querySelectorAll('.tooltip-trigger');
                this.init();
            }

            init() {
                this.triggers.forEach(trigger => {
                    const tooltipId = trigger.getAttribute('aria-describedby');
                    const tooltip = document.getElementById(tooltipId);

                    if (!tooltip) return;

                    const showTooltip = () => this.show(tooltip);
                    
                    // robust hide: only hide if neither hovered nor focused
                    const checkHide = () => {
                        // Small delay to allow focus/mouse moves to settle
                        setTimeout(() => {
                            const isHovered = trigger.matches(':hover') || tooltip.matches(':hover');
                            const isFocused = document.activeElement === trigger;
                            
                            if (!isHovered && !isFocused) {
                                this.hide(tooltip);
                            }
                        }, 10);
                    };

                    // Mouse events
                    trigger.addEventListener('mouseenter', showTooltip);
                    trigger.addEventListener('mouseleave', checkHide);
                    
                    // Allow hovering the tooltip itself without closing (good UX)
                    tooltip.addEventListener('mouseenter', showTooltip);
                    tooltip.addEventListener('mouseleave', checkHide);

                    // Keyboard events (focus)
                    trigger.addEventListener('focus', showTooltip);
                    trigger.addEventListener('blur', checkHide);
                    
                    // Escape key to close
                    trigger.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            this.hide(tooltip);
                            // Prevent re-appearing immediately if mouse is still there
                            trigger.blur(); 
                        }
                    });
                });
            }

            show(tooltip) {
                tooltip.classList.add('is-visible');
                tooltip.setAttribute('aria-hidden', 'false');
            }

            hide(tooltip) {
                tooltip.classList.remove('is-visible');
                tooltip.setAttribute('aria-hidden', 'true');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new TooltipManager();
        });
    </script>

</body>
</html>
