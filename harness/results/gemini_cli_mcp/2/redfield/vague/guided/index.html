<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* Container styling kept for layout, but positioning logic moved to anchor */
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;

            /* Anchor Positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Use popover styling defaults, customize appearance */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Remove default popover border */

            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Standard property for positioning */
            width: max-content;
            margin: 0; /* Reset margin for precise positioning */
            margin-bottom: 10px; /* Space from button */
            
            /* Fallback positioning for browsers without full anchor support even with polyfill? 
               The polyfill should handle it, but standard popover centering is default without anchor. 
            */
        }
        
        /* Popover backdrop/animation styles can be added here if desired */
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            Modern Tooltip Implementation:
            - 'interestfor' connects the button to the tooltip for hover/focus behavior (from Interest Invokers).
            - 'popover' attribute makes the div a popover element.
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfill Loader -->
    <script>
        // Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = 'js/interestfor.min.js';
            document.head.appendChild(script);
        }

        // Popover Polyfill
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = 'js/popover.min.js';
            document.head.appendChild(script);
        }

        // CSS Anchor Positioning Polyfill
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            script.src = 'js/css-anchor-positioning.js';
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
