<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Jive - Premium Coffee</title>
    <meta name="description" content="Experience the finest artisanal coffee at Java Jive. Sustainably sourced, expertly roasted.">
    <style>
        :root {
            --color-bg: #FDFBF7;
            --color-text: #2C241B;
            --color-primary: #A67B5B;
            --color-secondary: #E3D5CA;
            --font-main: system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(253, 251, 247, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            min-height: 200vh; /* Ensure plenty of scroll space */
        }

        .intro {
            max-width: 600px;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.25rem;
        }

        /* Scroll-driven Animation */
        @keyframes fade-scale-in {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hero-image-container {
            width: 100%;
            max-width: 1000px;
            margin: 4rem 0; /* Add margin to push it down so it enters view */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            /* 
             * animation-timeline: view()
             * This animates the element as it moves through the viewport.
             */
            animation: fade-scale-in linear forwards;
            animation-timeline: view();
            /* Start animation when top of image is 10% into view, end when it's 50% through */
            animation-range: entry 10% cover 50%;
        }

        .actions {
            margin: 2rem 0;
            position: relative;
        }

        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(166, 123, 91, 0.4);
        }

        /* Popover Styles */
        /* Note: using [popover] attribute selector */
        [popover] {
            border: none;
            padding: 2rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 300px;
            font-size: 1rem;
            color: var(--color-text);
            /* Positioning is handled by the browser, but we can style it */
            margin: auto;
        }
        
        [popover]::backdrop {
            background: transparent; /* Non-modal usually doesn't need a heavy backdrop, or can be transparent */
        }

        [popover]:popover-open {
            /* Optional entry animation for popover */
            animation: pop-in 0.2s ease-out;
        }

        @keyframes pop-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        ul {
            padding-left: 1.2rem;
        }
        li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Java Jive</h1>
</header>

<main class="hero">
    <div class="intro">
        <p>A symphony of flavor in every cup. Sustainably sourced from the world's finest regions.</p>
    </div>

    <!-- Details Button -->
    <div class="actions">
        <!-- popovertarget provides click support by default, JS adds hover -->
        <button id="details-btn" popovertarget="ingredients-popover">Details</button>
    </div>

    <!-- Non-modal Popover -->
    <div id="ingredients-popover" popover>
        <h3 style="margin-top:0">The Perfect Blend</h3>
        <ul>
            <li><strong>Origin:</strong> Ethiopian Yirgacheffe</li>
            <li><strong>Roast:</strong> Medium-Dark</li>
            <li><strong>Notes:</strong> Jasmine, Lemon, Bergamot</li>
            <li>100% Organic & Fair Trade</li>
        </ul>
    </div>

    <div class="hero-image-container">
        <!-- Hero Image (Src set by JS) -->
        <img id="hero-img" class="hero-image" alt="Pouring latte art into a coffee cup" width="1600" height="900">
    </div>

    <div style="margin-top: 5rem; text-align: center; opacity: 0.6;">
        <p>Scroll down to see the effect...</p>
        <p>&darr;</p>
    </div>
    
    <!-- Content to ensure scrolling -->
    <div style="height: 100vh;"></div>
</main>

<script>
    /**
     * Adaptive Loading
     * Uses navigator.connection to serve lower quality images on slow networks.
     */
    const heroImg = document.getElementById('hero-img');
    const highResUrl = 'https://images.unsplash.com/photo-1497935586351-b67a49e012bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80';
    const lowResUrl = 'https://images.unsplash.com/photo-1497935586351-b67a49e012bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=40'; // Significantly smaller

    function updateImageSource() {
        let isSlow = false;
        if ('connection' in navigator) {
            const { saveData, effectiveType } = navigator.connection;
            // 4g is usually fast. 3g, 2g, slow-2g are considered slow for high-res hero images.
            if (saveData === true || effectiveType === 'slow-2g' || effectiveType === '2g' || effectiveType === '3g') {
                isSlow = true;
            }
        }
        
        // Only update if not already set or if changing (optional optimization)
        const targetUrl = isSlow ? lowResUrl : highResUrl;
        if (heroImg.src !== targetUrl) {
            heroImg.src = targetUrl;
            console.log(`[Adaptive Loading] Connection: ${navigator.connection?.effectiveType || 'unknown'}, Source: ${isSlow ? 'Low-res' : 'High-res'}`);
        }
    }

    // Initial check
    updateImageSource();

    // Listen for connection changes
    if ('connection' in navigator) {
        navigator.connection.addEventListener('change', updateImageSource);
    } else {
        // Fallback for browsers without connection API
        heroImg.src = highResUrl;
    }


    /**
     * Popover Hover Logic
     * Native popover API is click-toggle by default via popovertarget.
     * We add hover support via JS.
     */
    const detailsBtn = document.getElementById('details-btn');
    const popoverEl = document.getElementById('ingredients-popover');
    let hoverTimeout;

    // Show on mouse enter
    detailsBtn.addEventListener('mouseenter', () => {
        // Clear any pending hide
        clearTimeout(hoverTimeout);
        // showPopover throws if already open, so safety check or try/catch
        try {
            if (!popoverEl.matches(':popover-open')) {
                popoverEl.showPopover();
            }
        } catch (err) {
            console.error('Popover error:', err);
        }
    });

    // Hide on mouse leave (with delay to allow moving to the popover)
    const handleLeave = () => {
        hoverTimeout = setTimeout(() => {
            try {
                if (popoverEl.matches(':popover-open')) {
                    popoverEl.hidePopover();
                }
            } catch (err) {
                console.error('Popover error:', err);
            }
        }, 300); // 300ms delay
    };

    detailsBtn.addEventListener('mouseleave', handleLeave);

    // Keep open if user moves cursor into the popover itself
    popoverEl.addEventListener('mouseenter', () => {
        clearTimeout(hoverTimeout);
    });
    
    popoverEl.addEventListener('mouseleave', handleLeave);

</script>

</body>
</html>
