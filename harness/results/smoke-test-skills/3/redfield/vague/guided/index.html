<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <!-- 
            Modern Approach:
            1. popover attribute on the content
            2. interestfor attribute on the button to link them
        -->
        <button class="tooltip-trigger" interestfor="my-tooltip">
            Hover over me
        </button>

        <div id="my-tooltip" popover="hint">
            I'm a modern tooltip!
        </div>
    </div>

    <!-- Main Script (Module to allow top-level await if needed, or import) -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
