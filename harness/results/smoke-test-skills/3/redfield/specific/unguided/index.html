<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needed for positioning, but keeping for layout structure if any */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Reset basic popover styles */
            margin: 0;
            border: none;
            
            position: absolute;
            position-anchor: --trigger;
            bottom: anchor(top); /* Position above the button */
            left: anchor(center);
            transform: translateX(-50%);
            margin-bottom: 12px; /* Gap between button and tooltip */

            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Popover API handles display */
        }
        
        /* Smooth entry/exit */
        #tooltip:popover-open {
            opacity: 1;
        }
        #tooltip {
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interesttarget triggers the tooltip on hover/focus -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- popover attribute makes it a popover element -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

</body>
</html>
