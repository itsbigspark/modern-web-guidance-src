<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espresso & Co.</title>
    <meta name="description" content="Artisan coffee shop serving the finest beans.">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Espresso & Co.</div>
            <ul class="nav-links">
                <li><a href="#menu">Menu</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#locations">Locations</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Experience Pure Coffee</h1>
                <p>Ethically sourced, perfectly roasted.</p>
                <button id="details-btn" popovertarget="ingredients-popover">Details</button>
            </div>
            
            <!-- Popover Content -->
            <div id="ingredients-popover" popover>
                <h3>Our Signature Blend</h3>
                <ul>
                    <li>100% Arabica Beans</li>
                    <li>Sourced from Ethiopia</li>
                    <li>Notes of blueberry & chocolate</li>
                </ul>
            </div>

            <!-- Hero Image with Adaptive Loading Placeholder logic controlled by JS -->
            <div class="hero-image-container">
                <img id="hero-img" 
                     src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?q=80&w=2071&auto=format&fit=crop" 
                     alt="Freshly brewed coffee in a cup"
                     width="600" height="400">
            </div>
        </section>

        <section class="content-spacer">
            <p>Scroll down to see the magic happen...</p>
            <!-- Adding minimal content to allow scrolling -->
            <div style="height: 150vh;"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Espresso & Co.</p>
    </footer>

</body>
</html>
