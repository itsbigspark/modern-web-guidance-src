<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer strictly needed for positioning, but keeps layout */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor setup */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display/hidden details */
            border: none;
            padding: 0;
            margin: 0;
            background: transparent;
            overflow: visible;

            /* Visuals */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            /* Anchor Positioning */
            position-anchor: --trigger;
            position-area: top; /* Centers horizontally and places above */
            margin-bottom: 10px; /* Space between tooltip and trigger */
        }

        /* Popover animation support (optional but nice) */
        #tooltip:popover-open {
            opacity: 1;
            transform: scale(1);
        }
        
        #tooltip {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.2s, transform 0.2s, display 0.2s allow-discrete;
        }

        /* Starting style for entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interesttarget connects this button to the popover for hover/focus -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- popover attribute makes it a popover -->
        <div id="tooltip" popover>I'm a modern tooltip!</div>
    </div>

</body>
</html>
