<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Declarative Tooltip</title>
    <script type="module" src="./js/interestfor.min.js"></script>
    <script type="module" src="./js/popover.min.js"></script>
    <script type="module" src="./js/css-anchor-positioning.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --my-trigger;
        }

        /* The Tooltip */
        [popover] {
            position-anchor: --my-trigger;
            position-area: top; 
            margin: 0;
            margin-bottom: 10px; /* visual spacing */
            
            /* Visuals */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            
            /* Ensure proper sizing */
            width: max-content;
            
            /* Fallback for browsers without position-area support if polyfill fails/delays */
            top: 0;
            left: 0;
        }

        /* Arrow (Optional - simplified for this demo as CSS Anchor Positioning arrow support is evolving) */
        [popover]::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor="tooltip" handles the hover logic (Interest Invokers).
            popover="hint" currently used for tooltips (or "auto" / "manual"). 
            "hint" is proposed for tooltips but might default to auto behavior in some polyfills.
        -->
        <button class="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern declarative tooltip!</div>
    </div>

</body>
</html>
