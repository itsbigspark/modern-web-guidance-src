<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Use Inter font for premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Example 1: Top Tooltip -->
    <button class="btn" 
            data-tooltip="I'm a modern, accessible tooltip!" 
            data-placement="top">
        Hover Me (Top)
    </button>

    <!-- Example 2: Bottom Tooltip with different content -->
    <button class="btn" 
            data-tooltip="I appear below the button." 
            data-placement="bottom" 
            style="background-color: #ec4899; box-shadow: 0 4px 6px rgba(236, 72, 153, 0.2);">
        Hover Me (Bottom)
    </button>

    <script src="tooltip.js"></script>

</body>
</html>
