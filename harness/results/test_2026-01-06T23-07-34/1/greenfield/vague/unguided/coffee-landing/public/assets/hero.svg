  <path d="M370 270 Q420 170 470 270 T570 270" stroke="#fefae0" stroke-width="3" fill="none" opacity="0.4" filter="url(#glow)" />
  <text x="50%" y="85%" dominant-baseline="middle" text-anchor="middle" fill="#fefae0" font-family="serif" font-size="24" opacity="0.8">Premium Coffee Experience</text>
