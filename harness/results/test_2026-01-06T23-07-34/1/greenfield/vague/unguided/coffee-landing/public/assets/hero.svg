<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(60,40,30);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(20,10,5);stop-opacity:1" />
