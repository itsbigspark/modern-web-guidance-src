<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nero's Coffee - Premium artisanal coffee experience. Savor the flavor of excellence.">
  <title>Nero's Coffee | The Art of Brewing</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="container">
    <div class="logo">NERO'S</div>
    <!-- Simple nav could go here -->
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <h1>Brewing Perfection<br>In Every Sip.</h1>
          <p>Experience the boldest flavors sourced from the finest beans across the globe. Ethically sourced, perfectly roasted.</p>
          
          <div class="details-btn-wrapper">
            <button class="details-btn" aria-describedby="tooltip-content">
              Details
            </button>
            <div id="tooltip-content" class="tooltip" role="tooltip">
              <h4>Our Signature Blend</h4>
              <ul>
                <li>Origin: <span>Ethiopia & Colombia</span></li>
                <li>Roast: <span>Medium-Dark</span></li>
                <li>Notes: <span>Dark Chocolate, Berry</span></li>
                <li>Acidity: <span>Balanced</span></li>
              </ul>
            </div>
          </div>
        </div>

        <div class="image-wrapper">
          <!-- Source will be set by JS script.js based on network speed -->
          <img class="hero-img" alt="Close up of a premium espresso shot in a dark ceramic cup" />
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
