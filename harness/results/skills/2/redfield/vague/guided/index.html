<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needed for positioning, but kept for layout */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --tooltip-trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip */
        #tooltip {
            /* Reset typical button/popover styles */
            border: none;
            margin: 0;
            
            /* Visuals */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 140px;

            /* Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            /* Inset to create gap */
            margin-bottom: 10px; 
            
            /* Fallbacks if top is clipped */
            position-try-fallbacks: flip-block;

            /* Animation */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        /* Popover open state */
        #tooltip:popover-open {
            opacity: 1;
        }

        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Arrow (Optional, might need tweaking with anchor positioning) */
        /* For simplicity in this demo, omitting the complex arrow positioning 
           as it requires more anchor-size math or specific arrow libraries to be perfect 
           with dynamic anchoring. But we can try a simple one. */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover for hover/focus behavior -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <!-- popover="hint" is ideal for tooltips -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script>
        (async () => {
            const polyfills = [];

            // 1. Popover API
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                console.log("Polyfilling Popover API...");
                polyfills.push(
                    import("./lib/popover.min.js")
                );
            }

            // 2. Anchor Positioning
            if (!("positionAnchor" in document.documentElement.style)) {
                console.log("Polyfilling Anchor Positioning...");
                polyfills.push(
                    import("./lib/css-anchor-positioning.js")
                );
            }

            // 3. Interest Invokers
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                console.log("Polyfilling Interest Invokers...");
                polyfills.push(
                    import("./lib/interestfor.min.js")
                );
            }

            try {
                await Promise.all(polyfills);
                if (polyfills.length > 0) {
                    console.log("All requested polyfills loaded successfully.");
                } else {
                    console.log("All features supported natively!");
                }
            } catch (e) {
                console.error("Error loading polyfills:", e);
            }
        })();
    </script>

</body>
</html>
