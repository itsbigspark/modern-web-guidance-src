<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <script>
        // Check and load polyfills as per best practices
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement("script");
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement("script");
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            script.type = "module";
            document.head.appendChild(script);
        }
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement("script");
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            script.type = "module";
            document.head.appendChild(script);
        }
    </script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Name for positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Reset & Base styles */
            margin: 0;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            
            /* Layout */
            width: max-content;
            max-width: 200px;

            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            bottom: anchor(top);
            left: anchor(center);
            translate: -50% -10px; /* Centered horizontally, moved up by 10px */
        }

        /* Triangle Arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Connects this button to the element with id="tooltip"
            This handles hover/focus interactions automatically.
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- 
            popover: Makes this element a popover (hidden by default, managed by the browser/polyfill)
        -->
        <div id="tooltip" popover>I'm a modern tooltip!</div>
    </div>

</body>
</html>
