<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warmConfig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B3832" />
      <stop offset="50%" stop-color="#854442" />
      <stop offset="100%" stop-color="#be9b7b" />
    </linearGradient>
    <filter id="cereal">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#warmConfig)" />
  <rect width="100%" height="100%" filter="url(#cereal)" opacity="0.1"/>
  <circle cx="600" cy="400" r="200" fill="#fff" opacity="0.1" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="60" fill="rgba(255,255,255,0.8)">Artisan Coffee</text>
</svg>
