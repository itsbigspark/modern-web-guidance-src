<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Added data-tooltip attribute for configuration -->
        <button id="tooltip-trigger" class="tooltip-trigger" data-tooltip="I'm a modern modular tooltip!">
            Hover or Focus me
        </button>
    </div>

    <script type="module">
        import { Tooltip } from './Tooltip.js';

        // Initialize tooltip
        const trigger = document.getElementById('tooltip-trigger');
        new Tooltip(trigger);
    </script>

</body>
</html>
