<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip (Hidden by default until invoked) */
        #tooltip {
            /* Reset some default popover styles */
            margin: 0;
            border: none;

            /* Anchor Positioning */
            position: absolute;
            bottom: anchor(top);
            /* Fallback or specific positioning */
            bottom: anchor(--tooltip-trigger top);
            /* Explicitly reference the anchor if needed, though position-anchor handles implicit */
            left: anchor(center);
            transform: translateX(-50%);
            /* Center horizontally */

            /* Alternatively with position-area (newer syntax if supported, but let's stick to anchor()) */
            /* position-area: top center; */

            /* Spacing from the anchor */
            margin-bottom: 10px;

            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            /* Popover specific: allow it to be visible when open */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 
            interesttarget: points to the ID of the element to show on hover/focus 
            anchor-name: defines this element as a positioning anchor
        -->
        <button id="tooltip-trigger" interesttarget="tooltip" style="anchor-name: --tooltip-trigger">Hover over
            me</button>

        <!-- 
            popover: makes it a popover element
            position-anchor: links it to the anchor defined above
        -->
        <div id="tooltip" popover style="position-anchor: --tooltip-trigger">I'm a modern popover tooltip!</div>
    </div>

    <!-- No JavaScript needed! -->

</body>

</html>
