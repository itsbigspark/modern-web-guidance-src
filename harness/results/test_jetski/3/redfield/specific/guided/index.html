<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --tooltip-trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip (Hidden by default until invoked) */
        #tooltip {
            /* Position relative to the anchor */
            position-anchor: --tooltip-trigger;
            position-area: top; /* vertically centered above */
            position-try-fallbacks: flip-block;

            /* Visual styling */
            margin: 0; /* create-react-app resets etc might interfere */
            margin-bottom: 5px; /* slight gap */
            width: max-content;
            max-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Popovers have a default border */
        }

        /* 
           Note: Pseudo-element arrows are tricky with native popover + anchor positioning 
           because the element's position is managed by the browser. 
           For now, we'll omit the arrow or one would use a more complex anchor setup 
           (e.g. anchor-center) if precise arrow alignment is key. 
           Standard simple popovers often skip the arrow.
        */
    </style>
</head>
<body>

    <div class="container">
        <!-- interesttarget is deprecated, use interestfor -->
        <!-- anchor-name is defined in CSS -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover attribute makes it a popover -->
        <div id="tooltip" popover="hint">I'm a modern popover tooltip!</div>
    </div>

    <!-- Polyfill for Popover API and Anchor Positioning (if needed) -->
    <script type="module">
        if (!("interestFor" in HTMLButtonElement.prototype)) {
          import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js");
        }
        if (!("positionAnchor" in document.documentElement.style)) {
          import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
        }
    </script>

</body>
</html>
