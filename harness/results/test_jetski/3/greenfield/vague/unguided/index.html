<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espresso & Dreams | Artisan Coffee</title>
  <meta name="description"
    content="Experience the finest artisan coffee at Espresso & Dreams. Sustainably sourced, expertly roasted.">
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <nav class="navbar">
    <div class="logo">Espresso & Dreams</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Story</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Awaken Your Senses</h1>
      <p>Hand-crafted espresso from the world's best beans.</p>
      <a href="#" class="cta-button">Order Now</a>
    </div>
    <div class="hero-image-container">
      <!-- Low quality placeholder will be set initially by JS if slow network, otherwise high res -->
      <img id="hero-img" class="hero-img"
        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
        alt="Latte art in a ceramic cup"
        data-src-high="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=2600&auto=format&fit=crop"
        data-src-low="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=40&w=400&auto=format&fit=crop">
    </div>
  </header>

  <section class="featured-product">
    <h2>Signature Blend</h2>
    <p>Our house blend is a rich, complex roast with notes of chocolate and cherry.</p>

    <div class="product-details-container">
      <button class="details-btn">Details
        <span class="tooltip">
          <strong>Ingredients:</strong><br>
          100% Arabica Beans<br>
          Notes of Dark Chocolate<br>
          Hint of Cherry<br>
          Roast: Medium-Dark
        </span>
      </button>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2024 Espresso & Dreams. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
