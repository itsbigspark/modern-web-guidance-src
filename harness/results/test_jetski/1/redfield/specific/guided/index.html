<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declarative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative; /* Kept for layout context if needed, but not for tooltip positioning */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display/hiding */
            margin: 0; /* Reset default browser margin for popovers */
            border: 0; /* Reset default border */
            
            position-anchor: --tooltip-trigger;
            position-area: top; /* Centers it above the anchor */
            
            width: max-content;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Animation for smooth appearance */
            opacity: 0;
            transition: opacity 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Starting style for entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Little arrow using anchor positioning if supported, or just simple CSS */
        /* Note: simplified arrow implementing using simple absolute positioning relative to the popover itself if it were possible, 
           but standard anchor positioning doesn't easily support the arrow sticking out without more complex CSS. 
           I will keep it simple as requested or maybe try a basic one. 
           Actually, let's omit the arrow for now to ensure clean Anchor Positioning usage, 
           as the `position-area` property handles the placement perfectly. 
           If I really want an arrow, I'd need to use `anchor()` syntax which is more verbose than `position-area`.
        */
    </style>
</head>
<body>

    <div class="container">
        <!-- added interestfor and popup attributes -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a declarative tooltip!</div>
    </div>

</body>
</html>
