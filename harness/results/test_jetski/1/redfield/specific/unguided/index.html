<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needs relative positioning for the tooltip, 
               but kept for layout of the button itself if needed. */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;

            /* Define this element as an anchor named --trigger */
            anchor-name: --trigger;
        }

        /* The Tooltip (Hidden by default) */
        #tooltip {
            /* Popover API handles display: none/block */

            /* Position relative to the anchor */
            position-anchor: --trigger;
            position: absolute;

            /* Modern anchor positioning */
            /* Try to put it above the trigger */
            bottom: anchor(top);
            left: anchor(center);
            translate: -50% -10px;
            /* Center horizontally and add some gap */
            margin: 0;
            /* Reset browser default margin for popovers */

            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            z-index: 1;
            /* Not strictly needed with top-layer but good for stacking context if needed */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            /* Popovers sometimes have default borders */
        }



        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- interesttarget connects the trigger to the tooltip for hover/focus behavior -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>

        <!-- popover attribute makes it a popover element -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

    <script>
        // No JavaScript needed! 
        // The Popover API and Interest Invokers handle the behavior natively.
    </script>

</body>

</html>
