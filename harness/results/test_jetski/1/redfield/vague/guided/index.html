<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Trigger Button -->
        <button class="tooltip-trigger" interestfor="my-popover">
            Hover for Magic ✨
        </button>

        <!-- Popover Tooltip -->
        <div id="my-popover" popover="manual">
            <div class="tooltip-content">
                <div class="tooltip-header">
                    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=100&auto=format&fit=crop" alt="Dog" class="tooltip-image">
                    <div>
                        <h3 class="tooltip-title">Modern & Clean</h3>
                        <p class="tooltip-text">Built with Popover API & Anchor Positioning.</p>
                    </div>
                </div>
                <p class="tooltip-text" style="margin-top: 8px; font-size: 0.85rem; opacity: 0.8;">
                   No complex JS logic required. Just pure web platform power.
                </p>
            </div>
        </div>
    </div>

    <!-- Main JS (Polyfills) -->
    <script type="module" src="main.js"></script>

</body>
</html>
