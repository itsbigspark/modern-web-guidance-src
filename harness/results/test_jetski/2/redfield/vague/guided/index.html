<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --my-trigger;
        }

        /* The Tooltip (Popover API + Anchor Positioning) */
        #tooltip {
            margin: 0; /* Reset default browser margin */
            position-anchor: --my-trigger;
            position-area: top; /* Shorthand for top center */
            position-try-fallbacks: flip-block;
            
            width: max-content;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Remove default dialog border */
            
            /* Animation */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow at the bottom of the tooltip */
        /* Note: Anchor positioning might make arrow positioning tricky without more complex CSS or another element. 
           For simplicity and robustness with the new API, we'll keep it simple or use a basic transform if needed.
           Let's try to keep the arrow if possible, but it needs to be relative to the tooltip. */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interesttarget is deprecated in favor of interestfor, 
            but the polyfill might still look for interesttarget or have specific requirements.
            The best practices said "Use interestfor".
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills for Popover, Anchor Positioning, and Interest Invokers -->
    <script type="module">
        // Anchor Positioning Polyfill
        if (!('anchorName' in document.documentElement.style)) {
            import('https://unpkg.com/@oddbird/css-anchor-positioning');
        }
    </script>
    <!-- Interest Invoker Polyfill -->
    <script type="module" src="https://unpkg.com/interestfor/dist/interestfor.js"></script>

</body>
</html>
