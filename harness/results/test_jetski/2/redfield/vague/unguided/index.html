<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --tooltip-bg: #333;
            --tooltip-text: #fff;
            --tooltip-arrow-size: 6px;
            --tooltip-radius: 6px;
            --tooltip-padding: 8px 12px;
            --tooltip-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition-speed: 0.2s;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
            transition: background-color var(--transition-speed) ease;
        }

        #tooltip-trigger:hover,
        #tooltip-trigger:focus-visible {
            background-color: var(--primary-hover);
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        /* The Tooltip */
        .tooltip {
            position: fixed; /* Fixed to viewport to avoid overflow clipping */
            top: 0;
            left: 0;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: center;
            padding: var(--tooltip-padding);
            border-radius: var(--tooltip-radius);
            z-index: 1000;
            font-size: 14px;
            box-shadow: var(--tooltip-shadow);
            pointer-events: none; /* Let clicks pass through */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-speed), transform var(--transition-speed);
            visibility: hidden; /* Hide from screen readers when not visible */
            max-width: 200px;
        }

        .tooltip.is-visible {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        /* Arrow */
        .tooltip::after {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            /* Dynamic arrow positioning handled by JS or simplified here */
            border-width: var(--tooltip-arrow-size);
            border-color: var(--tooltip-bg) transparent transparent transparent;
            bottom: calc(var(--tooltip-arrow-size) * -2);
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* Modifiers for different positions if needed */
        .tooltip--top::after {
            bottom: calc(var(--tooltip-arrow-size) * -2);
            left: 50%;
            transform: translateX(-50%);
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" aria-describedby="tooltip-content">Hover or Focus me</button>
    </div>

    <!-- 
      Ideally, tooltips should be generated or related by ID. 
      We'll keep a template or just let the JS create it. 
      For this demo, we can have a hidden source or strict JS generation.
      Let's use data-tooltip attribute for content on the trigger 
      OR an existing element if that's preferred.
    -->
    
    <script>
        /**
         * A modern, class-based Tooltip controller.
         * Handles positioning, accessibility, and animations.
         */
        class Tooltip {
            constructor(triggerElement, options = {}) {
                this.trigger = triggerElement;
                this.content = options.content || triggerElement.getAttribute('data-tooltip') || 'Default Tooltip';
                this.position = options.position || 'top';
                this.gap = options.gap || 10;
                
                this.tooltipElement = null;
                this.isVisible = false;

                // Bind methods
                this.show = this.show.bind(this);
                this.hide = this.hide.bind(this);
                this.updatePosition = this.updatePosition.bind(this);

                this.init();
            }

            init() {
                // Accessibility
                const id = `tooltip-${Math.random().toString(36).substr(2, 9)}`;
                this.trigger.setAttribute('aria-describedby', id);
                this.tooltipId = id;

                // Event Listeners
                this.trigger.addEventListener('mouseenter', this.show);
                this.trigger.addEventListener('mouseleave', this.hide);
                this.trigger.addEventListener('focus', this.show);
                this.trigger.addEventListener('blur', this.hide);
                
                // Keyboard: Escape to close
                this.trigger.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isVisible) {
                        this.hide();
                    }
                });
            }

            createTooltip() {
                if (this.tooltipElement) return;

                const div = document.createElement('div');
                div.id = this.tooltipId;
                div.className = 'tooltip';
                div.setAttribute('role', 'tooltip');
                div.textContent = this.content;
                document.body.appendChild(div);
                this.tooltipElement = div;
            }

            show() {
                this.createTooltip();
                this.isVisible = true;
                this.tooltipElement.classList.add('is-visible');
                this.updatePosition();
                
                // Update position on scroll/resize
                window.addEventListener('scroll', this.updatePosition, { passive: true });
                window.addEventListener('resize', this.updatePosition, { passive: true });
            }

            hide() {
                if (!this.tooltipElement) return;
                this.isVisible = false;
                this.tooltipElement.classList.remove('is-visible');
                
                // Clean up listeners
                window.removeEventListener('scroll', this.updatePosition);
                window.removeEventListener('resize', this.updatePosition);
                
                // Optional: Remove form DOM after transition to save memory, 
                // but keeping it is fine for performance if frequently toggled.
                // For this demo, we'll keep it.
            }

            updatePosition() {
                if (!this.isVisible || !this.tooltipElement) return;

                const triggerRect = this.trigger.getBoundingClientRect();
                const tooltipRect = this.tooltipElement.getBoundingClientRect();

                // Simple 'top' positioning logic
                // Center horizontally
                let left = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
                // Position above
                let top = triggerRect.top - tooltipRect.height - this.gap;

                // Prevent overflowing left/right (basic collision detection)
                if (left < 10) left = 10;
                if (left + tooltipRect.width > window.innerWidth - 10) {
                    left = window.innerWidth - tooltipRect.width - 10;
                }

                this.tooltipElement.style.top = `${top}px`;
                this.tooltipElement.style.left = `${left}px`;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('tooltip-trigger');
            new Tooltip(trigger, {
                content: "I'm a modern, accessible tooltip!"
            });
        });
    </script>
</body>
</html>
