<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Polyfills for Interest Invokers, Popover, and Anchor Positioning -->
    <script src="https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js"></script>
    <script src="https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js"></script>
    <script src="https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Standard property for anchor positioning */
            margin-inline: auto; /* Centers it horizontally relative to anchor */
            position-try-fallbacks: flip-block;
            
            width: max-content;
            max-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Remove default popover border */
        }

        /* Little arrow at the bottom of the tooltip */
        /* Note: With position-area, arrows are tricky without anchor-center or similar, 
           but we can try to keep it simple for now or rely on the background shape. 
           For a robust modern tooltip, usually we omit the arrow or use a slightly different technique,
           but let's try to keep the visual style close to original if possible. 
           However, position-area changes how things flow. 
           Let's just keep the box for now to ensure we don't break layout with complexity. */
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover via ID -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" is semantically correct for tooltips -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
