<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name */
            anchor-name: --trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Basic Box Model */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Remove default popover border */
            
            /* Positioning logic */
            position-anchor: --trigger;
            inset: auto; /* Reset default popover insets */
            bottom: anchor(top); /* Position above the anchor */
            left: anchor(center); /* Center horizontally relative to anchor */
            translate: -50% -10px; /* Center alignment correction + gap */
            margin: 0; /* Clear default browser margin for popovers */

            /* Transitions (optional but nice) */
            opacity: 0;
            transition: opacity 0.2s allow-discrete, overlay 0.2s allow-discrete, display 0.2s allow-discrete;
        }

        /* Popover open state */
        #tooltip:popover-open {
            opacity: 1;
        }

        /* Starting style for entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%; /* Bottom of the tooltip */
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <!-- 
      We remove the container styling wrapper as it's no longer needed for positioning.
      However, we keep the div for layout if necessary, but here the body centers everything.
    -->
    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
    
    <!-- 
      The tooltip element uses the popover attribute.
      'interesttarget' on the button connects to this id.
    -->
    <div id="tooltip" popover>I'm a modern popover tooltip!</div>

</body>
</html>
