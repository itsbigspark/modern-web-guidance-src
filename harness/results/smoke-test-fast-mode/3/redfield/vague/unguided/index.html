<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Design Tokens */
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-primary: #6366f1;
            --color-primary-dark: #4f46e5;
            --color-secondary: #ec4899;
            --color-text-main: #1e293b;
            --color-text-inverse: #ffffff;
            
            --tooltip-bg: rgba(15, 23, 42, 0.95);
            --tooltip-radius: 8px;
            --tooltip-arrow-size: 6px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-main);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            background-image: radial-gradient(circle at 10% 20%, rgb(242, 246, 252) 0%, rgb(235, 238, 255) 90.2%);
        }

        /* Demo Container */
        .preview-area {
            display: flex;
            gap: 1.5rem;
            padding: 3rem;
            background: var(--color-surface);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Modern Button Styles */
        .btn {
            position: relative; /* Anchor for tooltip */
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            background-color: var(--color-surface);
            color: var(--color-text-main);
            box-shadow: 0 0 0 1px #e2e8f0, var(--shadow-sm);
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-text-inverse);
            box-shadow: var(--shadow-sm);
        }
        
        .btn-secondary {
            background-color: var(--color-secondary);
            color: var(--color-text-inverse);
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        /* 
         * Tooltip Implementation
         */
        
        /* The container generated by JS */
        .tooltip-element {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px) scale(0.95);
            
            background-color: var(--tooltip-bg);
            color: var(--color-text-inverse);
            padding: 10px 16px;
            border-radius: var(--tooltip-radius);
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1000;
            
            opacity: 0;
            margin-bottom: 14px; /* Space from trigger */
            
            /* Glassmorphism */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);

            transition: 
                opacity 0.2s ease,
                transform 0.25s var(--ease-spring);
        }

        .tooltip-element.is-visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        /* Tooltip Arrow */
        .tooltip-element::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: calc(var(--tooltip-arrow-size) * -1);
            border-width: var(--tooltip-arrow-size);
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="preview-area">
        <button class="btn btn-primary" data-tooltip="✨ Premium Experience" aria-label="Premium Button">
            Hover Me
        </button>

        <button class="btn btn-secondary" data-tooltip="🚀 Launch Action" aria-label="Launch Button">
            Launch
        </button>

        <button class="btn" data-tooltip="⚙️ Settings & Config" aria-label="Settings">
            Configure
        </button>
    </div>

    <script>
        /**
         * Modern Tooltip Controller
         * - Zero dependencies
         * - Event delegation
         * - Accessibility (ARIA)
         * - Keyboard support
         */
        class TooltipManager {
            constructor() {
                this.activeTooltip = null;
                this.activeTrigger = null;
                this.initListeners();
            }

            initListeners() {
                // Use event delegation to handle all current and future tooltips
                ['mouseenter', 'focusin'].forEach(event => {
                    document.body.addEventListener(event, (e) => {
                        const trigger = e.target.closest('[data-tooltip]');
                        if (trigger) this.show(trigger);
                    }, true); // Capture phase to ensure we catch focus early
                });

                ['mouseleave', 'focusout', 'blur'].forEach(event => {
                    document.body.addEventListener(event, (e) => {
                        // When leaving, check if we are leaving the active trigger
                        const trigger = e.target.closest('[data-tooltip]');
                        if (trigger && trigger === this.activeTrigger) {
                            this.hide();
                        }
                    }, true);
                });

                // Close on Escape for accessibility
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') this.hide();
                });
            }

            show(trigger) {
                // Avoid re-showing if already active on same element
                if (this.activeTooltip && this.activeTrigger === trigger) return;
                
                // If switching to a new one, hide old one immediately
                if (this.activeTooltip) this.hide(true);

                const text = trigger.getAttribute('data-tooltip');
                if (!text) return;

                this.activeTrigger = trigger;

                // Create tooltip span (valid phrasing content inside button)
                const tooltip = document.createElement('span');
                tooltip.className = 'tooltip-element';
                tooltip.textContent = text;
                tooltip.setAttribute('role', 'tooltip');
                
                // ARIA linkage
                const id = `tooltip-${Math.random().toString(36).substr(2, 9)}`;
                tooltip.id = id;
                trigger.setAttribute('aria-describedby', id);

                // Mount
                trigger.appendChild(tooltip);
                
                // Animate in
                requestAnimationFrame(() => {
                    tooltip.classList.add('is-visible');
                });

                this.activeTooltip = tooltip;
            }

            hide(immediate = false) {
                if (!this.activeTooltip) return;

                const tooltip = this.activeTooltip;
                const trigger = this.activeTrigger;

                // Cleanup ARIA
                if (trigger) {
                    trigger.removeAttribute('aria-describedby');
                }

                if (immediate) {
                    tooltip.remove();
                } else {
                    tooltip.classList.remove('is-visible');
                    // Wait for transition
                    tooltip.addEventListener('transitionend', () => {
                        tooltip.remove();
                    }, { once: true });
                }

                this.activeTooltip = null;
                this.activeTrigger = null;
            }
        }

        // Initialize the system
        new TooltipManager();
    </script>
</body>
</html>
