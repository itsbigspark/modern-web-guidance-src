<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Modern shorthand */
            position-try-fallbacks: flip-block;
            margin: 0; /* Remove default browser margins for popovers */
            margin-bottom: 5px;

            /* Visual Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Polyfill overrides if needed (popover-polyfill adds fixed positioning) */
        :popover-open {
            display: block;
        }
    </style>
</head>
<body>

    <button class="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    <div id="tooltip" popover="hint">I'm a modern tooltip!</div>

    <!-- Feature Detection and Polyfill Loading -->
    <script>
        (function() {
            // Helper to load script
            function loadScript(src, isModule = false) {
                const script = document.createElement('script');
                script.src = src;
                if (isModule) script.type = 'module';
                document.head.appendChild(script);
            }

            // 1. Interest Invokers Polyfill
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                loadScript('js/interestfor.min.js');
            }

            // 2. Popover Polyfill
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                loadScript('js/popover.min.js', true);
            }

            // 3. CSS Anchor Positioning Polyfill
            // Check for support of anchor-name or position-anchor
            if (!CSS.supports('position-anchor: --foo')) {
                loadScript('js/css-anchor-positioning.js', true);
            }
        })();
    </script>
</body>
</html>
