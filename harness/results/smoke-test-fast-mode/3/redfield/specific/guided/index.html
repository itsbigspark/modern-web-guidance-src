<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No longer needs relative positioning for the tooltip */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Basic resets for popover */
            padding: 8px;
            border: none;
            margin: 0;
            
            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 140px;

            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Positions above the anchor */
            position-try-fallbacks: flip-block;
            margin-bottom: 10px; /* Space between tooltip and trigger */
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
          interestfor: Connects the trigger to the popover for hover/focus behavior 
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- 
          popover="hint": Semantically appropriate for tooltips
        -->
        <div id="tooltip" popover="hint">I'm a modern popover tooltip!</div>
    </div>

</body>
</html>
