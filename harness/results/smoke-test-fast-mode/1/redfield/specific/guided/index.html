<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Basic styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            /* Popover & Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            width: max-content;
            margin: 0; /* Important for position-area to work correctly without offsets */
            position-try-fallbacks: flip-block;
        }

        /* Little arrow at the bottom of the tooltip */
        /* Note: With basic position-area, accurate arrows are harder without extra anchor-positioning complexity. 
           Keeping it simple as requested, but attempting to retain the visual style to some degree. 
           If the browser supports anchor positioning fully, the arrow might misalign if we don't handle it carefully.
           For this modernization, we'll omit the arrow to ensure clean positioning logic, 
           or we can try to keep it but it might look odd if the popover flips. 
           Let's rely on the clean floating look. */
    </style>
</head>
<body>

    <div class="container">
        <!-- Added interestfor attribute -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- Added popover attribute -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills for broader support (Interest Invokers are bleeding edge) -->
    <script type="module">
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            console.log("Loading interestfor polyfill...");
            import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js");
        }
        
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            console.log("Loading popover polyfill...");
            import("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js");
        }

        if (!("positionAnchor" in document.documentElement.style)) {
            console.log("Loading css-anchor-positioning polyfill...");
            import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
        }
    </script>
</body>
</html>
