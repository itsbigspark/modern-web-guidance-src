<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Positions above the anchor */
            position-try-fallbacks: flip-block;
            margin: 0;
            margin-bottom: 10px; /* Spacing */

            /* Visual Styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            width: max-content;
            max-width: 200px;

            /* Transition Effects */
            opacity: 0;
            transition: opacity 0.2s allow-discrete, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
    <script type="module">
        // Feature detection and conditional polyfill loading
        
        // 1. Interest Invokers
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            await import("https://unpkg.com/interestfor@1.0.7/dist/interestfor.min.js");
        }

        // 2. Popover API
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            await import("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js");
        }

        // 3. CSS Anchor Positioning
        if (!("positionAnchor" in document.documentElement.style)) {
            await import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
        }
    </script>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Defines the ID of the popover to show on hover/interest
            aria-describedby: Good practice for accessibility coupling
        -->
        <button id="tooltip-trigger" class="tooltip-trigger" interestfor="tooltip" aria-describedby="tooltip">
            Hover over me
        </button>

        <!-- 
            popover="hint": Semantically appropriate for tooltips
        -->
        <div id="tooltip" popover="hint">
            I'm a modern tooltip!
        </div>
    </div>

</body>
</html>
