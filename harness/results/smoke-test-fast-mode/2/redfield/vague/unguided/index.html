<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --tooltip-bg: rgba(30, 41, 59, 0.9);
            --tooltip-text: #ffffff;
            --transition-speed: 0.2s;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            transition: all var(--transition-speed) ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        #tooltip-trigger:hover,
        #tooltip-trigger:focus-visible {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            outline: 2px solid var(--primary-hover);
            outline-offset: 2px;
        }

        /* The Tooltip */
        #tooltip {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: max-content;
            max-width: 200px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: center;
            padding: 8px 16px;
            border-radius: 6px;
            z-index: 10;
            font-size: 14px;
            font-weight: 400;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
            
            /* Hidden state */
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease, visibility var(--transition-speed);
            pointer-events: none;
        }

        /* Visible state */
        #tooltip.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Arrow */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" aria-describedby="tooltip">Hover or Focus me</button>
        <div id="tooltip" role="tooltip">I'm a modern, accessible tooltip!</div>
    </div>

    <script>
        const trigger = document.getElementById('tooltip-trigger');
        const tooltip = document.getElementById('tooltip');

        function showTooltip() {
            tooltip.classList.add('is-visible');
            trigger.setAttribute('aria-expanded', 'true');
        }

        function hideTooltip() {
            tooltip.classList.remove('is-visible');
            trigger.setAttribute('aria-expanded', 'false');
        }

        // Mouse events
        trigger.addEventListener('mouseenter', showTooltip);
        trigger.addEventListener('mouseleave', hideTooltip);

        // Keyboard events
        trigger.addEventListener('focus', showTooltip);
        trigger.addEventListener('blur', hideTooltip);

        // Escape key to dismiss
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && tooltip.classList.contains('is-visible')) {
                hideTooltip();
                trigger.focus(); // Retain focus
            }
        });
    </script>

</body>
</html>
