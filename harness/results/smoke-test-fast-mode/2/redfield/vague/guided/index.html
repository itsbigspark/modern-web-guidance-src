<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            anchor-name: --tooltip-trigger;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Popover/Anchor styles */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Standard anchor positioning */
            width: max-content;
            margin-inline: auto;
            position-try-fallbacks: flip-block;

            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Animation */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete, overlay 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }
        
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Modern declarative tooltip trigger -->
        <button id="tooltip-trigger" class="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- Modern popover tooltip -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script type="module">
        // Feature detection and polyfill loading
        
        // 1. Interest Invokers
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            await import('./js/interestfor.min.js');
        }

        // 2. Popover
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            await import('./js/popover.min.js');
        }

        // 3. Anchor Positioning
        if (!("positionAnchor" in document.documentElement.style)) {
            await import('./js/css-anchor-positioning.js');
        }
    </script>

</body>
</html>
