<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <script type="module">
        if (!("popover" in HTMLElement.prototype)) {
            await import("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js");
        }
        if (!("interestForElement" in HTMLButtonElement.prototype)) {
            await import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js");
        }
        if (!CSS.supports("position-anchor: --foo")) {
            await import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
        }
    </script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No relative positioning needed for anchor positioning */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display: none/block */
            position: absolute; /* Required for anchor positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Shorthand for top center */
            width: max-content;
            margin-right: auto;
            margin-left: auto;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Reset default popover border */
            position-try-fallbacks: flip-block;
            margin-bottom: 10px; /* Space from trigger */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover via interest invokers -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" is semantically correct for tooltips -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
