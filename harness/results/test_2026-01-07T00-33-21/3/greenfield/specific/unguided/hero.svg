<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgba(212, 163, 115, 0.8)" />
      <stop offset="100%" style="stop-color:rgba(15, 14, 13, 1)" />
    </radialGradient>
    <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.60" numOctaves="3" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1f1c18" />
  <circle cx="600" cy="400" r="300" fill="url(#grad1)" />
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.1" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#d4a373" opacity="0.5">High Res Hero Image</text>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#d4a373" opacity="0.3">Simulated 4K Photo</text>
</svg>
