<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        [popover] {
            position-anchor: --tooltip-trigger;
            position-area: top;
            margin: 0;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }

        /* Arrow using anchor positioning if possible, or simplified for now since position-area handles placement cleanly */
        /* For this demo, we'll keep it simple as position-area centers it beautifully */
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover for hover behavior -->
        <button class="trigger" interestfor="my-tooltip">Hover over me</button>
        
        <!-- popover="hint" suggests tooltip semantics -->
        <div id="my-tooltip" popover="hint">I'm a modern popover tooltip!</div>
    </div>

    <!-- Polyfills for Interest Invokers and Anchor Positioning -->
    <script>
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }

        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            script.type = "module";
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
