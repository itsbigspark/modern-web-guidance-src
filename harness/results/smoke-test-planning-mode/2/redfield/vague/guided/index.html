<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Polyfills -->
    <script src="js/interestfor.min.js" type="module"></script>
    <script src="js/popover.min.js" type="module"></script>
    <script src="js/css-anchor-positioning.js" type="module"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 50% 10%, #f4f4f9, #e0e0e6);
            color: #333;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            
            /* Anchor Positioning */
            anchor-name: --my-trigger;
        }

        .tooltip-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 123, 255, 0.4);
        }

        .tooltip-trigger:active {
            transform: translateY(0);
        }

        /* The Tooltip using Popover API + Anchor Positioning */
        #my-tooltip {
            /* Reset some default popover styles */
            border: none;
            margin: 0;
            padding: 0;
            
            /* Visuals */
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            white-space: nowrap;

            /* Anchor Positioning Logic */
            position-anchor: --my-trigger;
            position-area: top; /* Modern shorthand for position-area: top center */
            /* Fallback for older browsers (though we have polyfill) */
            top: anchor(top);
            left: anchor(center);
            transform: translateX(-50%) translateY(-10px); /* Spacing */
            margin-bottom: 8px;

            /* Animation */
            opacity: 0;
            transition: opacity 0.2s ease, display 0.2s ease allow-discrete, overlay 0.2s ease allow-discrete;
        }

        /* Popover Open State */
        #my-tooltip:popover-open {
            opacity: 1;
        }

        /* Arrow (Optional cosmetic) */
        #my-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: rgba(30, 30, 30, 0.9) transparent transparent transparent;
        }

        /* Polyfill fix for position-area compatibility if needed, 
           adds specific margin handling if position-area is polyfilled differently 
        */
        @supports not (position-area: top) {
             /* Fallback or specific polyfill styles if necessary */
        }
    </style>
</head>
<body>

    <!-- 
      Using 'interestfor' to trigger the popover on hover/focus (Interest Invoker).
      'popover="hint"' is semantically correct for tooltips.
    -->
    <button class="tooltip-trigger" interestfor="my-tooltip">
        Hover over me
    </button>

    <div id="my-tooltip" popover="hint">
        Modern Toolkit Magic! ✨
    </div>

</body>
</html>
