<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --tooltip-bg: #1e293b;
            --tooltip-text: #ffffff;
            --tooltip-border-radius: 8px;
            --tooltip-arrow-size: 6px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --transition-speed: 0.2s;
        }

        body {
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            gap: 20px;
        }

        /* Tooltip Trigger Buttons */
        .tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .tooltip-trigger:hover, .tooltip-trigger:focus {
            background-color: var(--primary-hover);
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }

        .tooltip-trigger:active {
            transform: translateY(1px);
        }

        /* The Tooltip Element */
        .modern-tooltip {
            position: absolute;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: var(--tooltip-border-radius);
            font-size: 14px;
            line-height: 1.4;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
            pointer-events: none; /* Let events pass through to elements below if needed */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 250px;
            text-align: center;
        }

        .modern-tooltip.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Arrow */
        .modern-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: calc(var(--tooltip-arrow-size) * -1);
            border-width: var(--tooltip-arrow-size);
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Tooltip Image Styling */
        .tooltip-image {
            display: block;
            max-width: 100%;
            border-radius: 4px;
            margin-top: 8px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <button class="tooltip-trigger" 
        data-tooltip-content="Simple, clean, and modern."
        aria-label="Hover for standard tooltip">
        Standard Tooltip
    </button>

    <button class="tooltip-trigger" 
        data-tooltip-content="Look at this cute cat!"
        data-tooltip-image="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=200&q=80"
        aria-label="Hover for image tooltip"
        style="background-color: #10b981;">
        With Image
    </button>

    <script>
        class TooltipManager {
            constructor() {
                this.tooltip = null;
                this.activeTrigger = null;
                this.init();
            }

            init() {
                // Create single shared tooltip element
                this.tooltip = document.createElement('div');
                this.tooltip.className = 'modern-tooltip';
                this.tooltip.id = 'global-tooltip';
                this.tooltip.setAttribute('role', 'tooltip');
                document.body.appendChild(this.tooltip);

                // Event delegation for performance and dynamic content support
                document.addEventListener('mouseover', (e) => this.handleEnter(e));
                document.addEventListener('mouseout', (e) => this.handleLeave(e));
                
                // Keyboard accessibility
                document.addEventListener('focusin', (e) => this.handleEnter(e));
                document.addEventListener('focusout', (e) => this.handleLeave(e));
            }

            handleEnter(e) {
                const trigger = e.target.closest('[data-tooltip-content]');
                if (!trigger) return;

                this.activeTrigger = trigger;
                this.show(trigger);
            }

            handleLeave(e) {
                // If moving to the tooltip itself (if we allowed pointer-events), we'd need logic here.
                // But for now, simple trigger-based logic.
                const trigger = e.target.closest('[data-tooltip-content]');
                if (trigger) {
                    this.hide();
                    this.activeTrigger = null;
                }
            }

            show(trigger) {
                const content = trigger.dataset.tooltipContent;
                const imageUrl = trigger.dataset.tooltipImage;

                if (!content) return;

                // Build Content
                let html = `<span>${this.escapeHtml(content)}</span>`;
                if (imageUrl) {
                    html += `<img src="${this.escapeHtml(imageUrl)}" alt="" class="tooltip-image" />`;
                }
                this.tooltip.innerHTML = html;

                // ARIA
                trigger.setAttribute('aria-describedby', this.tooltip.id);

                // Position calculation (simplistic, could use Floating UI for robust positioning)
                this.updatePosition(trigger);

                // Show
                requestAnimationFrame(() => {
                    this.tooltip.classList.add('is-visible');
                });
            }

            hide() {
                this.tooltip.classList.remove('is-visible');
                if (this.activeTrigger) {
                    this.activeTrigger.removeAttribute('aria-describedby');
                }
            }

            updatePosition(trigger) {
                const rect = trigger.getBoundingClientRect();
                const tooltipRect = this.tooltip.getBoundingClientRect();
                const scrollY = window.scrollY;
                const scrollX = window.scrollX;

                const arrowHeight = 6; // Match CSS
                const gap = 10; 

                // Center horizontally
                let left = rect.left + scrollX + (rect.width / 2) - (tooltipRect.width / 2);
                // Position above
                let top = rect.top + scrollY - tooltipRect.height - gap;

                this.tooltip.style.left = `${left}px`;
                this.tooltip.style.top = `${top}px`;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize
        new TooltipManager();
    </script>

</body>
</html>
