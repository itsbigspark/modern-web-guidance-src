<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --my-trigger;
        }

        /* The Tooltip */
        #tooltip {
            margin: 0;
            position: absolute; /* Fallback for older browsers if polyfill fails slightly or during load */
            position-anchor: --my-trigger;
            inset-area: top center;
            position-try-fallbacks: flip-block;
            
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            overflow: visible;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Defines the element this button interests (triggers)
            popover: Defines the element as a popover
        -->
        <button class="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Feature Detection & Polyfills -->
    <script>
        // Check for Popover API support
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = 'vendor/popover.min.js';
            script.type = 'module';
            document.head.appendChild(script);
        }

        // Check for Interest Invokers support
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = 'vendor/interestfor.min.js';
            script.type = 'module';
            document.head.appendChild(script);
        }

        // Check for Anchor Positioning support
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            script.src = 'vendor/css-anchor-positioning.js';
            script.type = 'module';
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
