<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor for the tooltip */
            anchor-name: --trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Basic styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Anchor Positioning */
            position-anchor: --trigger;
            position-area: top; /* Newer syntax for inset-area */
            margin-bottom: 10px; /* Space for the arrow */
            
            /* Animation support (optional but nice for modern UI) */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <!-- 
      Modern approach:
      1. 'interesttarget' connects the button to the tooltip for hover/focus behavior.
      2. 'popover' attribute makes the div a popover.
    -->
    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
    <div id="tooltip" popover>I'm a modern popover!</div>

</body>
</html>
