<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f4f9;
            --tooltip-bg: #fff;
            --tooltip-text: #333;
            --transition-speed: 0.2s;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* Avatar Trigger Button */
        .avatar-btn {
            appearance: none;
            background: none;
            border: 2px solid transparent;
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            transition: border-color 0.3s ease, transform 0.2s ease;
        }

        .avatar-btn:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 4px;
        }

        .avatar-btn:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .avatar-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* Modern Tooltip / Rich Card */
        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 260px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            border-radius: 12px;
            padding: 0;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed), transform var(--transition-speed), visibility var(--transition-speed);
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Active State */
        .tooltip[data-show] {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        /* Tooltip Header (Cover Image) */
        .tooltip-header {
            height: 80px;
            background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Tooltip Content */
        .tooltip-body {
            padding: 0 15px 15px;
            text-align: center;
            position: relative;
        }

        .tooltip-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
            margin: -35px auto 10px;
            display: block;
            background-color: #eee;
            object-fit: cover;
        }

        .tooltip-body h3 {
            margin: 0 0 5px;
            font-size: 1.1rem;
            color: #222;
        }

        .tooltip-desc {
            font-size: 0.9rem;
            color: #666;
            margin: 0 0 15px;
            line-height: 1.4;
        }

        .tooltip-stats {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-weight: 700;
            color: #333;
            font-size: 0.95rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Arrow (using a pseudo-element on the tooltip) */
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Trigger Button -->
        <button id="profile-trigger" class="avatar-btn" aria-describedby="profile-tooltip" aria-label="View Profile">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Alex Morgan" class="avatar-img">
        </button>

        <!-- Tooltip Element -->
        <div id="profile-tooltip" class="tooltip" role="tooltip">
            <div class="tooltip-header"></div>
            <div class="tooltip-body">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Alex Morgan" class="tooltip-avatar">
                <h3>Alex Morgan</h3>
                <p class="tooltip-desc">Frontend Developer & UX Designer. Building accessible web interfaces.</p>
                <div class="tooltip-stats">
                    <div class="stat">
                        <span class="stat-value">1,240</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value">85</span>
                        <span class="stat-label">Projects</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('profile-trigger');
            const tooltip = document.getElementById('profile-tooltip');

            // Show logic
            const showTooltip = () => {
                tooltip.setAttribute('data-show', '');
            };

            // Hide logic
            const hideTooltip = () => {
                tooltip.removeAttribute('data-show');
            };

            // Mouse Events
            trigger.addEventListener('mouseenter', showTooltip);
            trigger.addEventListener('mouseleave', hideTooltip);

            // Keyboard Focus Events (Accessibility)
            trigger.addEventListener('focus', showTooltip);
            trigger.addEventListener('blur', hideTooltip);

            // Close on Escape key if open
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && tooltip.hasAttribute('data-show')) {
                    hideTooltip();
                    trigger.focus(); // Restore focus to trigger
                }
            });
        });
    </script>
</body>
</html>
