<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            display: inline-block;
            position: relative; /* Fallback context if anchor positioning fails */
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name for positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Visual Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Reset default popover border */
            
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Positions the tooltip above the anchor */
            width: max-content;
            margin: 0; /* Reset default popover margin */
            margin-bottom: 10px; /* Spacing from the trigger */

            /* Ensure it stays on top */
            z-index: 1000;
            
            /* Animation */
            opacity: 0;
            transition: opacity 0.2s allow-discrete, display 0.2s allow-discrete;
        }

        /* Show state for popover */
        #tooltip:popover-open {
            opacity: 1;
        }
        
        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 'interestfor' connects the button to the popover for hover/focus behavior -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- 'popover="hint"' designates this element as a tooltip -->
        <div id="tooltip" popover="hint">I'm a modern, semantic tooltip!</div>
    </div>

    <script type="module">
        // Feature detection and conditional polyfill loading
        
        // Check for 'interestfor' support (Interest Invokers)
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            console.log("Loading interestfor polyfill...");
            await import('./js/interestfor.min.js');
        }

        // Check for Popover API support
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            console.log("Loading popover polyfill...");
            await import('./js/popover.min.js');
        }

        // Check for CSS Anchor Positioning support
        if (!CSS.supports('position-anchor: --foo')) {
            console.log("Loading CSS anchor positioning polyfill...");
            await import('./js/css-anchor-positioning.js');
        }
    </script>

</body>
</html>
