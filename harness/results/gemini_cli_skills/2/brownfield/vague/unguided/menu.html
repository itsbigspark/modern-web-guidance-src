<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | The Daily Grind</title>
  <link rel="prefetch" href="index.html">
  <script type="speculationrules">
  {
    "prerender": [
      {
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": "/logout" } }
          ]
        },
        "eagerness": "immediate"
      }
    ]
  }
  </script>
  <style>
    :root {
      --primary: #4e342e;
      --secondary: #d7ccc8;
      --accent: #ffab40;
      --text: #3e2723;
      --light: #fafafa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--light);
    }

    nav {
      background: var(--primary);
      color: white;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 2rem;
    }

    .menu-category {
        margin-bottom: 3rem;
    }
    
    .menu-category h2 {
        border-bottom: 2px solid var(--accent);
        display: inline-block;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
    }

    .menu-item {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .item-details h3 {
        margin-bottom: 0.5rem;
    }

    .price {
        font-weight: bold;
        color: var(--primary);
        font-size: 1.2rem;
    }
    
    .back-link {
        display: inline-block;
        margin-top: 2rem;
        color: var(--primary);
        text-decoration: none;
        font-weight: bold;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">THE DAILY GRIND</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Our Menu</h1>

    <div class="menu-category">
        <h2>Espresso Bar</h2>
        <div class="menu-item">
            <div class="item-details">
                <h3>Cappuccino</h3>
                <p>Rich espresso with steamed milk and foam.</p>
            </div>
            <span class="price">$4.50</span>
        </div>
        <div class="menu-item">
            <div class="item-details">
                <h3>Latte</h3>
                <p>Espresso with plenty of steamed milk.</p>
            </div>
            <span class="price">$4.75</span>
        </div>
    </div>

    <div class="menu-category">
        <h2>Brewed Coffee</h2>
        <div class="menu-item">
            <div class="item-details">
                <h3>House Blend</h3>
                <p>Our signature medium roast.</p>
            </div>
            <span class="price">$3.00</span>
        </div>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
  </main>

</body>
</html>
