<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin: 0; /* Reset default popover margin */
            
            /* Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Animation support */
            opacity: 0;
            transition: opacity 0.2s, display 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow using a pseudo-element on the tooltip */
        /* Note: Positioning this with anchor positioning can be tricky, 
           sticking to a simple visual style for now or using standard CSS */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Associates the button with the popover for hover interactions 
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- 
            popover: Designates this element as a popover 
        -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills for modern features -->
    <script type="module">
        // 1. Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }

        // 2. Popover Polyfill
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            document.head.appendChild(script);
        }

        // 3. CSS Anchor Positioning Polyfill
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            // The polyfill needs to process styles, so we load it as a module or script
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            // Check if we need to manually trigger the polyfill or if it runs on load
            // Usually these polyfills observe DOM or run on load.
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
