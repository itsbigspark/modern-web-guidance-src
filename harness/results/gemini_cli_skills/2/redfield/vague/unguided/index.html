<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --tooltip-bg: rgba(17, 24, 39, 0.95);
            --tooltip-text: #ffffff;
            --tooltip-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition-speed: 0.2s;
            --arrow-size: 6px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* Modern Button Styling */
        .tooltip-trigger {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }

        .tooltip-trigger:hover, .tooltip-trigger:focus-visible {
            background-color: var(--primary-hover);
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }

        .tooltip-trigger:active {
            transform: scale(0.98);
        }

        /* Modern Tooltip Styling */
        .tooltip {
            position: absolute;
            bottom: calc(100% + 10px); /* Position above with gap */
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: max-content;
            max-width: 250px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: center;
            padding: 0; /* Padding handled by internal elements or specific overrides */
            border-radius: 8px;
            z-index: 10;
            font-size: 0.875rem;
            line-height: 1.4;
            box-shadow: var(--tooltip-shadow);
            
            /* Hidden state for transition */
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease, visibility var(--transition-speed);
            pointer-events: none; /* Prevent mouse interaction with tooltip itself */
            overflow: hidden; /* For image rounding */
        }

        /* Show state */
        .tooltip.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* Arrow */
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: calc(var(--arrow-size) * -1);
            border-width: var(--arrow-size);
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Rich Content Styling */
        .tooltip-content {
            display: flex;
            flex-direction: column;
        }

        .tooltip-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tooltip-text {
            padding: 12px;
        }

        .tooltip-title {
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <button id="main-trigger" class="tooltip-trigger" aria-describedby="main-tooltip">
            Hover or Focus Me
        </button>
        
        <div id="main-tooltip" class="tooltip" role="tooltip">
            <div class="tooltip-content">
                <img src="https://picsum.photos/id/1015/300/200" alt="Scenic landscape" class="tooltip-image" loading="lazy">
                <div class="tooltip-text">
                    <span class="tooltip-title">Modern Tooltip</span>
                    Features accessible ARIA attributes, CSS transitions, and rich content support.
                </div>
            </div>
        </div>
    </div>

    <script>
        class Tooltip {
            constructor(triggerElement) {
                this.trigger = triggerElement;
                this.tooltipId = this.trigger.getAttribute('aria-describedby');
                this.tooltip = document.getElementById(this.tooltipId);

                if (!this.tooltip) {
                    console.error(`Tooltip with id "${this.tooltipId}" not found.`);
                    return;
                }

                this.init();
            }

            init() {
                // Bind methods to 'this'
                this.show = this.show.bind(this);
                this.hide = this.hide.bind(this);

                // Mouse events
                this.trigger.addEventListener('mouseenter', this.show);
                this.trigger.addEventListener('mouseleave', this.hide);

                // Keyboard events (accessibility)
                this.trigger.addEventListener('focus', this.show);
                this.trigger.addEventListener('blur', this.hide);
                
                // Escape key to close
                this.trigger.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.hide();
                    }
                });
            }

            show() {
                this.tooltip.classList.add('is-visible');
                this.trigger.setAttribute('aria-expanded', 'true');
            }

            hide() {
                this.tooltip.classList.remove('is-visible');
                this.trigger.setAttribute('aria-expanded', 'false');
            }
        }

        // Initialize tooltips
        document.addEventListener('DOMContentLoaded', () => {
            const triggers = document.querySelectorAll('.tooltip-trigger');
            triggers.forEach(trigger => new Tooltip(trigger));
        });
    </script>

</body>
</html>
