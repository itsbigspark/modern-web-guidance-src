<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew - Artisan Coffee</title>
    <style>
        :root {
            --primary-color: #6f4e37;
            --text-color: #333;
            --bg-color: #f4f1ea;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            padding: 2rem;
            text-align: center;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        /* Scroll-driven animation for Hero Image */
        @keyframes fade-scale-in {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hero-img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 2rem;
            /* Default state: visible */
            opacity: 1;
            transform: scale(1);
        }

        @supports (animation-timeline: view()) {
            .hero-img {
                /* Initial state for animation */
                opacity: 0;
                transform: scale(0.8);
                
                animation: fade-scale-in linear both;
                animation-timeline: view();
                animation-range: entry 10% cover 30%; /* Starts when 10% in view, ends at 30% */
            }
        }

        .content {
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Popover & Anchor Positioning */
        .details-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            anchor-name: --details-btn;
            margin-top: 1rem;
        }
        
        /* Ensure popover is positioned relative to the button if not supported */
        .popover-container {
            position: relative;
            display: inline-block;
        }

        .ingredient-popover {
            padding: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Anchor Positioning */
            position-anchor: --details-btn;
            position-area: top; 
            margin-bottom: 10px; /* Spacing */
            width: max-content;
            
            /* Popover styles */
            margin: 0;
            inset: auto;
        }
        
        /* Fallback for position-area if needed */
        @supports not (position-area: top) {
             .ingredient-popover {
                position: absolute;
                top: -100px; /* Crude fallback */
                left: 50%;
                transform: translateX(-50%);
             }
        }

        .spacer {
            height: 150vh; /* Force scroll */
            background: linear-gradient(to bottom, #f4f1ea, #e0d8c8);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 5rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bean & Brew</h1>
        <p>Est. 2026</p>
    </header>

    <div class="spacer">
        <p>Scroll down to see our signature blend...</p>
    </div>

    <section class="hero">
        <!-- Adaptive Loading API: loading-placeholder -->
        <img 
            src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=800&auto=format&fit=crop" 
            loading-placeholder="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=10&w=100&auto=format&fit=crop"
            alt="Freshly brewed coffee in a white cup" 
            class="hero-img"
        >
        
        <h2>The Morning Kick</h2>
        <p>Our signature dark roast with notes of chocolate and cherry.</p>
        
        <!-- Interest Invoker (Popover trigger on hover) -->
        <button class="details-btn" interestfor="ingredients-popover">
            Details
        </button>

        <div id="ingredients-popover" class="ingredient-popover" popover="hint">
            <strong>Ingredients:</strong><br>
            • 100% Arabica Beans<br>
            • Filtered Water<br>
            • Love
        </div>
    </section>

    <div class="spacer">
        <p>More deliciousness below...</p>
    </div>

    <!-- Polyfills -->
    <script>
        // 1. Adaptive Loading
        if (!('loadingPlaceholder' in HTMLImageElement.prototype)) {
            const s = document.createElement('script');
            s.src = 'http://example.github.io/adaptive-loading-polyfill/adaptive-loading.min.js';
            document.head.appendChild(s);
        }

        // 2. Interest Invokers
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const s = document.createElement('script');
            s.type = 'module';
            s.src = 'https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js';
            document.head.appendChild(s);
        }

        // 3. Popover
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const s = document.createElement('script');
            s.type = 'module';
            s.src = 'https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js';
            document.head.appendChild(s);
        }

        // 4. CSS Anchor Positioning
        if (!("positionAnchor" in document.documentElement.style)) {
            const s = document.createElement('script');
            s.type = 'module';
            s.src = 'https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js';
            document.head.appendChild(s);
        }
    </script>
</body>
</html>
