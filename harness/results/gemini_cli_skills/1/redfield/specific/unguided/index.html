<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* CSS Anchor Positioning */
            anchor-name: --trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Position relative to the anchor */
            position-anchor: --trigger;
            position-area: top center;
            margin: 0;
            margin-bottom: 12px; /* Spacing equivalent to original 125% - 100% gap roughly */
            
            /* Visual Styles */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none; /* Remove default popover border */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: visible; /* Ensure arrow is visible */
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
        
        /* Smooth fade in/out for the popover */
        #tooltip {
            transition: opacity 0.2s, display 0.2s allow-discrete, overlay 0.2s allow-discrete;
            opacity: 0;
        }
        
        #tooltip:popover-open {
            opacity: 1;
        }
        
        /* Starting style for the entry animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 
      Modern HTML Popover API with Interest Invokers 
      interesttarget handles hover/focus/long-press behavior automatically.
    -->
    <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
    
    <div id="tooltip" popover>I'm a modern popover!</div>

</body>
</html>
