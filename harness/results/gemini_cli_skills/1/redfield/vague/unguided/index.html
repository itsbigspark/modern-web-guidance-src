<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --tooltip-bg: #1e293b;
            --tooltip-text: #ffffff;
            --transition-speed: 0.2s;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .tooltip-container {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-btn {
            appearance: none;
            border: none;
            background: none;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            transition: transform var(--transition-speed) ease;
            position: relative;
        }

        .avatar-btn:hover, .avatar-btn:focus-visible {
            transform: scale(1.05);
            outline: 2px solid var(--primary-color);
            outline-offset: 4px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: var(--shadow-sm);
            display: block;
            border: 2px solid white;
        }

        .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            line-height: 1.4;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed), transform var(--transition-speed), visibility var(--transition-speed);
            pointer-events: none;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Arrow */
        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: var(--tooltip-bg) transparent transparent transparent;
        }

        /* Visible State */
        .tooltip.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .tooltip strong {
            display: block;
            font-weight: 600;
        }
        
        .tooltip span {
            font-size: 0.75rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="tooltip-container">
        <!-- 
            Accessibility Improvements:
            - aria-describedby connects the button to the tooltip
            - aria-label provides context if the image fails or for screen readers
        -->
        <button id="profile-trigger" class="avatar-btn" aria-label="View User Profile" aria-describedby="profile-tooltip">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80" alt="Alex Morgan" class="avatar">
        </button>
        
        <div id="profile-tooltip" role="tooltip" class="tooltip">
            <strong>Alex Morgan</strong>
            <span>Product Designer</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('profile-trigger');
            const tooltip = document.getElementById('profile-tooltip');

            const showTooltip = () => {
                tooltip.classList.add('is-visible');
                trigger.setAttribute('aria-expanded', 'true');
            };

            const hideTooltip = () => {
                tooltip.classList.remove('is-visible');
                trigger.setAttribute('aria-expanded', 'false');
            };

            // Mouse events
            trigger.addEventListener('mouseenter', showTooltip);
            trigger.addEventListener('mouseleave', hideTooltip);

            // Keyboard focus events for accessibility
            trigger.addEventListener('focus', showTooltip);
            trigger.addEventListener('blur', hideTooltip);

            // Accessibility: Close on Escape key if button is focused
            trigger.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    hideTooltip();
                }
            });
        });
    </script>

</body>
</html>
