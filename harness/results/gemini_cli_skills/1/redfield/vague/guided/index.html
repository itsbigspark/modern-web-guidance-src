<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* No relative positioning needed for container with anchor positioning */
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --my-trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover default styles override */
            border: none;
            padding: 0;
            margin: 0;

            /* Visuals */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: max-content;
            max-width: 200px;

            /* Anchor Positioning */
            position-anchor: --my-trigger;
            position-area: top; /* Shorthand for 'top center' */
            margin-bottom: 8px; /* Spacing from trigger */
            position-try-fallbacks: flip-block; /* Flip to bottom if not enough space */
            
            /* Transition for smooth appearance */
            opacity: 0;
            transition: opacity 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* 
           Note: The little arrow is trickier with basic popover/anchor without more complex CSS 
           or `anchor()` function usage which might be flaky in polyfills. 
           We'll omit it for a cleaner modern look or use a simple pseudo-element if supported.
        */
    </style>
    
    <!-- Polyfills -->
    <!-- Popover Polyfill -->
    <script src="js/popover.min.js" type="module"></script>
    <!-- Anchor Positioning Polyfill -->
    <script src="js/css-anchor-positioning.js" type="module"></script>
    <!-- Interest Invoker Polyfill -->
    <script src="js/interestfor.min.js" type="module"></script>

</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Connects the button to the tooltip for hover/focus behavior
            popover: Makes the div a popover element
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

</body>
</html>
