<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rewards | The Daily Grind</title>
  <link rel="stylesheet" href="../style.css">
  <script type="speculationrules">
  {
    "prerender": [
      {
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": "/logout" } }
          ]
        },
        "eagerness": "moderate"
      }
    ]
  }
  </script>
</head>
<body>
  <nav>
    <div class="logo"><a href="/" style="color:white;text-decoration:none;">THE DAILY GRIND</a></div>
    <ul>
      <li><a href="/menu">Menu</a></li>
      <li><a href="/locations">Locations</a></li>
      <li><a href="/rewards">Rewards</a></li>
      <li><a href="/account">My Account</a></li>
      <li><a href="/logout" class="logout-link">Logout</a></li>
    </ul>
  </nav>

  <header class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1549488344-c7052fb518f2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');">

    <p>Earn points with every purchase.</p>
  </header>

  <main class="container">
    <div class="grid">
       <div class="card">
         <h3>Join Today</h3>
         <p>Get 50 points just for signing up.</p>
         <a href="/account" class="btn">Sign Up</a>
       </div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/about">Our Story</a> |
      <a href="/careers">Join the Team</a> |

      <a href="/privacy-policy">Privacy</a>
    </div>

  </footer>

</html>
