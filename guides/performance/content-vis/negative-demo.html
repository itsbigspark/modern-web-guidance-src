<!DOCTYPE html>
<html>
<!-- MISSING: viewport meta tag -->

<head>
    <title>Anti-Pattern Demo</title>
    <!-- BAD: Inline styles for everything -->
    <style>
        /* VIOLATION: Applying content-visibility to the entire body/LCP area */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            content-visibility: auto; /* CRITICAL FAIL: Delays first paint */
            /* VIOLATION: No contain-intrinsic-size specified, leading to layout collapse */
        }

        .header {
            background: #333;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
            /* VIOLATION: Applying to LCP element */
            content-visibility: auto; 
        }

        .item {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            /* VIOLATION: Missing contain-intrinsic-size, causing scrollbar jumping */
            content-visibility: auto;
        }

        /* VIOLATION: Targeting too granular elements */
        .tag {
            display: inline-block;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
            content-visibility: auto; /* Pointless overhead for small elements */
        }

        .hidden-menu {
            /* VIOLATION: Using content-visibility: hidden for accessibility hiding without aria-hidden */
            /* Screen readers might still navigate here if not careful, unlike display: none */
            content-visibility: hidden; 
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Welcome to the Laggy Page</h1>
        <p>This page violates every rule in the guide.</p>
    </div>

    <div class="hidden-menu">
        <ul>
            <li><a href="#">Hidden Item 1</a></li>
            <li><a href="#">Hidden Item 2</a></li>
        </ul>
    </div>

    <div id="container">
        <!-- Content generated by JS -->
    </div>

    <script>
        const container = document.getElementById('container');
        
        // Generate a lot of content
        for (let i = 0; i < 1000; i++) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <h3>Item ${i}</h3>
                <p>Some content here...</p>
                <span class="tag">tag1</span>
                <span class="tag">tag2</span>
            `;
            container.appendChild(div);
        }

        // VIOLATION: Force Synchronous Layout on skipped elements
        // The guide explicitly says NOT to do this.
        setInterval(() => {
            const items = document.querySelectorAll('.item');
            let totalHeight = 0;
            
            items.forEach(item => {
                // accessing offsetHeight forces the browser to render the element 
                // even if content-visibility: auto had skipped it.
                // This defeats the entire purpose of the feature and causes lag.
                totalHeight += item.offsetHeight; 
            });
            
            console.log('Forced layout calculation:', totalHeight);
        }, 1000);

        // VIOLATION: No feature detection or fallback strategy
    </script>
</body>
</html>
