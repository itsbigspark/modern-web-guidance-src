<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Rendering Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            background: #333;
            color: white;
            padding: 20px;
            margin-bottom: 20px;
        }

        .item {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            /* content-visibility: auto allows skipping rendering for off-screen content */
            content-visibility: auto;
            /* contain-intrinsic-size provides a placeholder size to prevent layout shifts */
            contain-intrinsic-size: auto 120px; 
        }

        .tag {
            display: inline-block;
            background: #eee;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .hidden-menu {
            display: none; /* Use display: none for true hiding unless state preservation is needed */
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Welcome to the Optimized Page</h1>
        <p>This page follows rendering performance best practices.</p>
    </div>

    <div class="hidden-menu">
        <ul>
            <li><a href="#">Hidden Item 1</a></li>
            <li><a href="#">Hidden Item 2</a></li>
        </ul>
    </div>

    <div id="container">
        <!-- Content generated by JS -->
    </div>

    <script>
        const container = document.getElementById('container');
        
        // Use DocumentFragment to batch DOM insertions
        const fragment = document.createDocumentFragment();

        // Generate a lot of content
        for (let i = 0; i < 1000; i++) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <h3>Item ${i}</h3>
                <p>Some content here...</p>
                <span class="tag">tag1</span>
                <span class="tag">tag2</span>
            `;
            fragment.appendChild(div);
        }
        
        container.appendChild(fragment);

        // Removed the setInterval that forced synchronous layout.
        // We do not want to force the browser to calculate layout for skipped elements.
        
        // Feature detection (optional but good practice)
        if (!('contentVisibility' in document.documentElement.style)) {
            console.warn('Browser does not support content-visibility');
        }
    </script>
</body>
</html>
