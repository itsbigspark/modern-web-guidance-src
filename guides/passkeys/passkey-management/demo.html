<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passkey Management Demo</title>
</head>
<body>
  <div class="card">
    <h2>Manage Your Passkeys</h2>
    <p>Sync state with your password manager in real-time.</p>
    
    <div id="list-container" class="credential-list" data-testid="credential-list">
      <!-- Managed Credential items will load here -->
    </div>

    <button id="create-btn" data-testid="create-passkey-button" style="display:none; margin-top: 1rem; background:#0066cc;">Create Passkey</button>
    <div id="status" style="margin-top: 1rem; font-weight: bold;" data-testid="management-status">Idle</div>
  </div>

  <script type="module">
      import aaguids from '/aaguids.json' with { type: 'json' };

    const base64UrlUserId = "M2YPl-KGnA8"; // Base64URL string User ID

    async function gateCreatePasskeyButton() {
      const btn = document.getElementById('create-btn');
      if (window.PublicKeyCredential) {
        const capabilities = await PublicKeyCredential.getClientCapabilities();
        if (capabilities?.passkeyPlatformAuthenticator) {
          btn.style.display = 'inline-block';
        }
      }
    }

    async function syncAcceptedCredentials(currentList) {
      if (window.PublicKeyCredential && PublicKeyCredential.signalAllAcceptedCredentials) {
        try {
          // Map Base64URL credential IDs
          const credentialIds = currentList.map(c => c.id);
          await PublicKeyCredential.signalAllAcceptedCredentials({
            rpId: window.location.hostname,
            userId: base64UrlUserId,
            allAcceptedCredentialIds: credentialIds
          });
        } catch (e) {
          console.error('Signal AllAcceptedCredentials sync threw:', e);
        }
      }
    }

    async function loadManagementUI() {
      const container = document.getElementById('list-container');
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Loading...';

      try {
        const response = await fetch('/api/credentials');
        if (!response.ok) throw new Error('Failed to load credentials');
        const list = await response.json();
        
        container.innerHTML = '';
        if (list.length === 0) {
          container.innerHTML = '<div class="empty-state" data-testid="empty-state">No passkeys found.</div>';
          statusEl.textContent = 'Idle';
          return;
        }

        list.forEach(cred => {
          // Zeroed AAGUID bypass lookup fallback rule
          let provider = { name: 'Unknown passkey provider' };
          if (cred.aaguid !== '00000000-0000-0000-0000-000000000000') {
            provider = aaguids[cred.aaguid] || { name: 'Unknown passkey provider' };
          }

          const item = document.createElement('div');
          item.className = 'credential-item';
          item.setAttribute('data-testid', `credential-item-${cred.id}`);
          
          const iconHtml = provider.icon_light
            ? `<img class="provider-icon" data-testid="provider-icon" src="${provider.icon_light}" alt="" width="32" height="32">`
            : '';
          const lastUsedHtml = cred.lastUsedAt
            ? `<span class="timestamp" data-testid="last-used">Last used: ${new Date(cred.lastUsedAt).toLocaleDateString()}</span>`
            : '';

          item.innerHTML = `
            <div class="credential-info">
              ${iconHtml}
              <div class="provider-details">
                <span class="provider-name" data-testid="provider-name">${cred.name || provider.name}</span>
                <span class="timestamp">Added: ${new Date(cred.registeredAt).toLocaleDateString()}</span>
                ${lastUsedHtml}
              </div>
            </div>
            <div>
              <button class="rename-btn" data-testid="rename-button-${cred.id}">Rename</button>
              <button class="delete-btn" data-testid="delete-button-${cred.id}">Delete</button>
            </div>
          `;
          
          // Wire action buttons
          item.querySelector('.rename-btn').addEventListener('click', () => performRename(cred.id));
          item.querySelector('.delete-btn').addEventListener('click', () => performDelete(cred.id));
          
          container.appendChild(item);
        });

        statusEl.textContent = 'Idle';
        // Sync on page load
        await syncAcceptedCredentials(list);
      } catch (e) {
        console.error(e);
        statusEl.textContent = `Error: ${e.message}`;
      }
    }

    async function performRename(id) {
      const newName = prompt('Enter a custom name:');
      if (!newName) return;
      
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Renaming...';

      try {
        const response = await fetch(`/api/credential/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName })
        });
        
        if (response.ok) {
          statusEl.textContent = 'Passkey Renamed';
          // Sync on successful renaming details
          if (window.PublicKeyCredential && PublicKeyCredential.signalCurrentUserDetails) {
            await PublicKeyCredential.signalCurrentUserDetails({
              rpId: window.location.hostname,
              userId: base64UrlUserId,
              name: 'user@example.com',
              displayName: newName
            });
          }
          await loadManagementUI();
        } else {
          throw new Error('Rename failed on server');
        }
      } catch (e) {
        console.error(e);
        statusEl.textContent = `Error: ${e.message}`;
      }
    }

    async function performDelete(id) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Deleting...';

      try {
        const response = await fetch(`/api/credential/${id}`, { method: 'DELETE' });
        if (response.ok) {
          statusEl.textContent = 'Passkey Deleted';
          // Re-query and Sync AllAcceptedCredentials list
          const updatedResponse = await fetch('/api/credentials');
          const updatedList = await updatedResponse.json();
          renderUI(updatedList); // Visual helper
          await syncAcceptedCredentials(updatedList);
        } else {
          throw new Error('Delete failed on server');
        }
      } catch (e) {
        console.error(e);
        statusEl.textContent = `Error: ${e.message}`;
      }
    }

    // Auxiliary visual renderer for deletions
    function renderUI(list) {
      const container = document.getElementById('list-container');
      container.innerHTML = '';
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state" data-testid="empty-state">No passkeys found.</div>';
        return;
      }
      // Basic render loop matching primary loads
      list.forEach(cred => {
        const item = document.createElement('div');
        item.className = 'credential-item';
        item.innerHTML = `
          <div class="credential-info"><span class="provider-name">${cred.name || 'iCloud Keychain'}</span></div>
        `;
        container.appendChild(item);
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      gateCreatePasskeyButton();
      loadManagementUI();
    });
  </script>
</body>
</html>
