<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Animations: Scroll Progress Indicator</title>
  <style>
    @layer reset, base, demo;

    @layer demo {
      @keyframes grow-progress {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      #progress {
        position: fixed;
        left: 0; top: 0;
        width: 100%; height: 1em;
        background: red;

        transform-origin: 0 50%;
        animation: grow-progress auto linear;
        animation-timeline: scroll();
      }
    }

    @layer base {
      body {
        height: 400dvh;
      }
    }

    @layer reset {
      * {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div id="progress"></div>
</body>
</html>
