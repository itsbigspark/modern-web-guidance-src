<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Language Detection Demo</title>
</head>

<body>
  <h1>Language Detection</h1>
  <p lang="es">Hola, ¿cómo estás?</p>
  <p lang="de">Hallo, wie geht's?</p>

  <button id="detect-btn">Detect Page Languages</button>
  <div id="output"></div>
 
  <script type="module">
    document.getElementById('detect-btn').addEventListener('click', async () => {
      const output = document.getElementById('output');
      output.textContent = 'Detecting...';
      try {
        if (!('LanguageDetector' in window)) {
          throw new Error('LanguageDetector not found');
        }
        const availability = await LanguageDetector.availability();
        if (availability === 'available' || availability === 'downloadable' || availability === 'downloading') {
          console.log('LanguageDetector is supported and can be used');
        }
        if (availability === 'unavailable') {
          throw new Error('LanguageDetector is not available');
        }
        const languageDetector = await LanguageDetector.create({
          monitor(m) {
            m.addEventListener('downloadprogress', (e) => {
              console.log(`Downloaded ${e.loaded * 100}%`);
            });
          },
        });
        
        output.innerHTML = '';
        for (const p of document.querySelectorAll('p')) {
          const result = await languageDetector.detect(p.textContent);
          const mostLikely = result[0];
          const resultText = `${p.textContent} -> Detected: ${mostLikely.detectedLanguage} (${Math.round(mostLikely.confidence * 100)}% confidence)`;
          console.log(resultText);
          const div = document.createElement('div');
          div.textContent = resultText;
          output.append(div);
        }
      } catch (e) {
        console.error(e);
        output.textContent = `Error: ${e.message}`;
      }
    });
  </script>
</body>

</html>
