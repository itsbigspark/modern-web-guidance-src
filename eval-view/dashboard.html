<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suite Results</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="diff.min.js"></script>

</head>

<body>
  <div class="container">
    <header>
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px;">
        <div>
          <h1>Suite Results</h1>
          <div id="test-header" style="font-size: 0.9em; color: var(--text-secondary); margin-top: 8px;">
            <!-- Test ID and timestamp will be injected here -->
          </div>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
          <a href="./" class="secondary-btn" style="text-decoration: none;">← Back to Results</a>
          <button id="auth-btn" class="secondary-btn" style="display: none;">
            Sign in with Google
          </button>
        </div>
      </div>
      <div id="summary-stats">
        <!-- Summary stats will be injected here -->
      </div>
    </header>

    <div id="chart-section" class="chart-container hidden" style="padding: 20px; display: flex; flex-direction: column; align-items: flex-start;">
        <div id="dumbbell-chart" style="width: 100%;"></div>
    </div>

    <div id="discipline-section" style="margin-bottom: 40px; display: none;">
        <h2 style="margin-bottom: 15px; color: var(--text-primary);">Discipline Evals</h2>
        <div id="discipline-grid" class="dashboard-grid"></div>
    </div>
    
    <div id="guide-section">
        <h2 style="margin-bottom: 15px; color: var(--text-primary);">Guide Evals</h2>
        <div id="guide-grid" class="dashboard-grid"></div>
    </div>

    <footer class="dashboard-footer">
      <a href="./" class="secondary-btn" style="margin-right: 10px;">← Back to Results</a>
      <button id="view-gcs-artifacts-btn" class="secondary-btn" style="display: none; margin-right: 10px;">View
        Source</button>
      <button id="view-log-btn" class="secondary-btn">View Full Run Log</button>
    </footer>
  </div>

  <dialog id="modal" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="close-modal" aria-label="Close modal">&times;</button>
      <h2 id="modal-title">Test Details</h2>
      <div id="modal-body">
        <!-- Detailed runs will be injected here -->
      </div>
    </div>
  </dialog>

  <script src="features_mapping.gen.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>

</html>
