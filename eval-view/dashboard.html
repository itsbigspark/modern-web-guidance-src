<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spike Test Eval Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="diff.min.js"></script>

</head>

<body>
  <div class="container">
    <header>
      <h1>Spike Test Eval Dashboard</h1>
      <div id="test-header" style="font-size: 0.9em; color: var(--text-secondary); margin-top: 8px;">
        <!-- Test ID and timestamp will be injected here -->
      </div>
      <div id="summary-stats">
        <!-- Summary stats will be injected here -->
      </div>
    </header>

    <div id="chart-section" class="chart-container hidden">
      <div id="radar-chart"></div>
    </div>

    <div id="dashboard-grid">
      <!-- Grid generated by JS -->
    </div>

    <footer class="dashboard-footer">
      <a href="./" class="secondary-btn" style="margin-right: 10px;">← Back to Results</a>
      <button id="view-log-btn" class="secondary-btn">View Full Run Log</button>
    </footer>
  </div>

  <dialog id="modal" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="close-modal" aria-label="Close modal">&times;</button>
      <h2 id="modal-title">Test Details</h2>
      <div id="modal-body">
        <!-- Detailed runs will be injected here -->
      </div>
    </div>
  </dialog>

  <script type="module" src="dashboard.js"></script>
</body>

</html>
