<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - All Runs</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="landing.css">
  <link rel="stylesheet" href="dashboard-layout.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="landing-container">
    <header class="header-nav">
      <div>
        <h1 class="landing-title">Modern Web Guidance Evals</h1>
      </div>
      <div class="filter-container-nav" style="display: flex; gap: 10px; align-items: center;">
        <button id="auth-btn" class="secondary-btn" style="display: none;">
          Sign in with Google
        </button>
        <button id="filter-btn" class="secondary-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"
            style="vertical-align: text-bottom; margin-right: 4px;">
            <path
              d="M6 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5zm-2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zm-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5z" />
          </svg>
          Filter Runs
        </button>
        <div id="filter-menu" class="filter-menu hidden">
          <div class="filter-header">
            <span class="filter-header-title">Select Test Runs</span>
            <div class="filter-actions">
              <button id="select-all-btn" class="text-btn">All</button>
              <button id="deselect-all-btn" class="text-btn">None</button>
            </div>
          </div>
          <div style="padding: 10px; border-bottom: 1px solid var(--border-color);">
            <input type="text" id="filter-search" placeholder="Search tests..."
              style="width: 100%; box-sizing: border-box; padding: 6px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); font-size: 0.9em; outline: none;">
          </div>
          <div id="filter-list" class="filter-list">
            <!-- Checkboxes injected by JS -->
          </div>
        </div>
      </div>
    </header>

    <!-- Suites Tab -->
    <div id="suites-tab" class="tab-content active">
      <details class="insights-drawer">
        <summary class="insights-summary">Uplift Comparisons</summary>
        <div id="insights-container" class="insights-grid">
          <!-- Populated by JS -->
        </div>
      </details>

      <div class="suites-table-container">
        <table class="suites-table">
          <thead>
            <tr>
              <th style="text-align: left;">Suite ID & Date</th>
              <th>
                <select id="filter-agent" class="header-filter-select">
                  <option value="all">Agent</option>
                  <optgroup label="Select Agent" id="filter-agent-group">
                    <!-- populated dynamically -->
                  </optgroup>
                </select>
              </th>
              <th>
                <select id="filter-serving" class="header-filter-select">
                  <option value="all">Serving</option>
                  <optgroup label="Select Architecture" id="filter-serving-group">
                    <!-- populated dynamically -->
                  </optgroup>
                </select>
              </th>
              <th>
                <select id="filter-model" class="header-filter-select">
                  <option value="all">Model</option>
                  <optgroup label="Select Model" id="filter-model-group">
                    <!-- populated dynamically -->
                  </optgroup>
                </select>
              </th>
              <th># Tasks</th>
              <th style="text-align: center; padding-right: 15px;">Uplift</th>
              <th id="header-source">
                <select id="filter-source" class="header-filter-select">
                  <option value="all">Source</option>
                  <optgroup label="Select Source">
                    <option value="local">Local</option>
                    <option value="remote">Remote</option>
                  </optgroup>
                </select>
              </th>
            </tr>
          </thead>
          <tbody id="suites-list">
            <!-- populated by JS -->
          </tbody>
          </table>
      </div>
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <p>No test runs found yet. Run the test suite to get started.</p>
    </div>
  </div>

  <div id="tooltip-container" class="tooltip-container hidden">
    <div id="tooltip-header"></div>
    <div id="tooltip-chart"></div>
  </div>

  <script type="module" src="landing.js"></script>
</body>
</html>
