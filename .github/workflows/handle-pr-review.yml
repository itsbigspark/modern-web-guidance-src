name: Handle PR Review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_CLI_TRUST_WORKSPACE: true

jobs:
  handle-review:
    # Only run on bot-generated PR branches (or as configured)
    if: startsWith(github.event.pull_request.head.ref, 'bot/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run feedback handler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --experimental-strip-types guides/feedback-handler.ts ${{ github.event.pull_request.number }}
