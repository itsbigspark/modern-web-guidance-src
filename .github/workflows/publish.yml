name: Publish Skills

on:
  # We currently want to publish manually.
  # push:
  #   branches: [ main ]
  #   paths:
  #     - 'serving/skills-cli/**'
  #     - 'guides/**'
  #     - '.github/workflows/publish.yml'
  workflow_dispatch: {}

concurrency:
  group: publish-skills
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for npm OIDC provenance when enabled

    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git for Auth and Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rewrite SSH to HTTPS using the App token for the target repo
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

      - name: Publish Skills to GitHub (modern-web-guidance)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm --filter serving run publish-skills

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd dist/skills-cli
          npm publish --access public

      # - name: Publish to npm via OIDC Provenance
      #   run: |
      #     npm install -g npm@latest
      #     cd dist/skills-cli-npx
      #     # Doesn't work unless repo is public. TODO: flip on when we open-source.
      #     # npm publish --provenance --access public --registry https://registry.npmjs.org/
