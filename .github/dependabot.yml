# Noise reduction strategy:
# 1. Weekly updates on Sundays to avoid daily interruptions.
# 2. Group ALL updates (major, minor, patch) into a single PR per project.
# 3. Limit total open PRs to prevent backlog accumulation.

version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/serving"
      - "/harness"
      - "/guides"
      - "/eval-view"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 3
    groups:
      everything:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
